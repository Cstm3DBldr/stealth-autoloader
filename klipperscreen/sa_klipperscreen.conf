# sa_klipperscreen.conf — Stealth Autoloader menu registration for KlipperScreen
#
# Drop in ~/printer_data/config/ and add to KlipperScreen config:
#   [include sa_klipperscreen.conf]

[menu __main autoloader]
name: Autoloader
icon: sa_autoloader

[menu __main autoloader status]
name: Status
panel: sa_main
icon: sa_autoloader

[menu __main autoloader load_unload]
name: Load / Unload
panel: sa_load_unload
icon: extruder

[menu __main autoloader macros]
name: Macros
panel: sa_macros
icon: settings

[menu __main autoloader settings]
name: Settings
panel: sa_settings
icon: settings
