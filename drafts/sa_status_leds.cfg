# DRAFT — toolhead Voron logo + nozzle LED status macros
#
# NOT DEPLOYED. This file lives in `drafts/` and is not in any of
# `post_update.sh`'s sync targets. Move to `autoloader/leds.cfg` (and
# add an include line in `autoloader.cfg`) once approved.
#
# Hardware assumption (verified on this printer 2026-05-05):
#   [neopixel et0_leds] ... [neopixel et5_leds]
#   chain_count: 3
#   color_order: GRB
#   - Index 0  -> Voron logo on the front of the StealthBurner
#   - Indexes 1, 2 -> nozzle LEDs (illuminate the print)
#
# RGBW compatibility: the macros below pass WHITE=N alongside R/G/B in
# every SET_LED call. On a GRB strip the WHITE channel is silently
# ignored; on a GRBW strip it's used. So the same macros work for both
# wirings. If the user ever switches the toolheads to RGBW, only
# color_order in the [neopixel] block needs updating; nothing here.

# ─────────────────────────────────────────────────────────────────
# Hex helper — converts "#RRGGBB" / "RRGGBB" to (r, g, b) floats 0-1
# ─────────────────────────────────────────────────────────────────
[gcode_macro _SA_HEX_TO_FLOATS]
description: Internal — sets {r,g,b} variables from HEX param
gcode:
    {% set h = params.HEX|default("#FFFFFF")|string %}
    {% if h.startswith("#") %}{% set h = h[1:] %}{% endif %}
    {% if h|length == 3 %}{% set h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2] %}{% endif %}
    {% if h|length != 6 %}{% set h = "FFFFFF" %}{% endif %}
    SET_GCODE_VARIABLE MACRO=_SA_LED_STATE VARIABLE=r VALUE={ (h[0:2]|int(base=16)) / 255 }
    SET_GCODE_VARIABLE MACRO=_SA_LED_STATE VARIABLE=g VALUE={ (h[2:4]|int(base=16)) / 255 }
    SET_GCODE_VARIABLE MACRO=_SA_LED_STATE VARIABLE=b VALUE={ (h[4:6]|int(base=16)) / 255 }


# Holding state across the helper call. Klipper jinja can't return
# values from one macro to another in a single expression so we stash
# them on this stub macro's variables.
[gcode_macro _SA_LED_STATE]
variable_r: 1.0
variable_g: 1.0
variable_b: 1.0
gcode:
    # No-op; this macro exists purely as a variable bag.

# ─────────────────────────────────────────────────────────────────
# Per-state public macros
# ─────────────────────────────────────────────────────────────────

[gcode_macro _SA_LED_PARKED]
description: Logo lit with filament color, nozzle LEDs off. Tool docked.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set hex_c = params.COLOR|default("#FFFFFF")|string %}
    _SA_HEX_TO_FLOATS HEX={hex_c}
    {% set r = printer["gcode_macro _SA_LED_STATE"].r|float %}
    {% set g = printer["gcode_macro _SA_LED_STATE"].g|float %}
    {% set b = printer["gcode_macro _SA_LED_STATE"].b|float %}
    # Logo (index 0) — full-saturation filament color
    SET_LED LED=et{t}_leds INDEX=1 RED={r} GREEN={g} BLUE={b} WHITE=0 TRANSMIT=0
    # Nozzle (indexes 1, 2) — off
    SET_LED LED=et{t}_leds INDEX=2 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1


[gcode_macro _SA_LED_UNLOADED]
description: Logo dim white, nozzle off. Path is empty / awaiting load.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    SET_LED LED=et{t}_leds INDEX=1 RED=0.10 GREEN=0.10 BLUE=0.10 WHITE=0.10 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=2 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1


[gcode_macro _SA_LED_ACTIVE]
description: Tool mounted on carriage. Logo + nozzle full white for printing.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    SET_LED LED=et{t}_leds INDEX=1 RED=1 GREEN=1 BLUE=1 WHITE=1 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=2 RED=1 GREEN=1 BLUE=1 WHITE=1 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=1 GREEN=1 BLUE=1 WHITE=1 TRANSMIT=1


[gcode_macro _SA_LED_LOADING]
description: Logo pulses filament color during SA_LOAD. Nozzle off.
gcode:
    # Klipper has no native pulsing; for now just set a 50%-saturated
    # filament color. A "pulse" effect would need [delayed_gcode] in a
    # loop or a klippy-extras script — defer until we want it.
    {% set t = params.TOOL|default(0)|int %}
    {% set hex_c = params.COLOR|default("#FFFFFF")|string %}
    _SA_HEX_TO_FLOATS HEX={hex_c}
    {% set r = printer["gcode_macro _SA_LED_STATE"].r|float * 0.5 %}
    {% set g = printer["gcode_macro _SA_LED_STATE"].g|float * 0.5 %}
    {% set b = printer["gcode_macro _SA_LED_STATE"].b|float * 0.5 %}
    SET_LED LED=et{t}_leds INDEX=1 RED={r} GREEN={g} BLUE={b} WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=2 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1


[gcode_macro _SA_LED_ERROR]
description: Solid red — slip detected, sensor mismatch, etc.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    SET_LED LED=et{t}_leds INDEX=1 RED=1 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=2 RED=0.3 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=0.3 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1


