# DRAFT — pressure advance per-filament-line database
#
# NOT DEPLOYED. This file lives in `drafts/` and is not in any of
# `post_update.sh`'s sync targets.
#
# Intent: extend the existing `filaments/brands/<brand>.cfg` schema so
# each filament product line carries a `pressure_advance` value. The
# autoloader's load sequence reads it at the end of SA_LOAD and emits
# `SET_PRESSURE_ADVANCE EXTRUDER=extruderN ADVANCE=<value>` for the
# active toolhead.
#
# Layered lookup (highest priority wins):
#   1. parameters.cfg SAVE_CONFIG block:  pa_override_T<N>  ← per-tool
#                                                            calibrated value
#   2. filament profile `pressure_advance` field            ← brand+line default
#   3. global default `pa_default_PLA` etc.                 ← per-material fallback
#   4. Klipper's [extruder] pressure_advance                ← absolute fallback
#
# This file demonstrates the schema with a few common filaments. A
# real deployment would have one section per brand+line pair the user
# actually owns, populated from the existing brand .cfg files in
# `filaments/brands/`.

# ─────────────────────────────────────────────────────────────────
# Per-material fallback values (used when a profile has no PA set)
# ─────────────────────────────────────────────────────────────────
[autoloader_pa_defaults]
PLA:   0.040
PETG:  0.060
ABS:   0.045
ASA:   0.045
TPU:   0.090
PA:    0.075        # nylon
PC:    0.050
PEEK:  0.030

# ─────────────────────────────────────────────────────────────────
# Per-line calibrated values
#
# Schema:
#   [autoloader_pa_line:<brand_id>:<line_id>]
#   pressure_advance: <float>
#   notes: optional human-readable comment
#
# brand_id and line_id MUST match the keys used in the existing
# `filaments/brands/<brand>.cfg` files so the autoloader load sequence
# can resolve a profile -> PA value with a single lookup.
# ─────────────────────────────────────────────────────────────────

[autoloader_pa_line:Polymaker:PolyTerra_PLA]
pressure_advance: 0.045
notes: Calibrated 2025-12 on T0, holds across temps 200-220C

[autoloader_pa_line:Polymaker:PolyLite_PLA]
pressure_advance: 0.038
notes: Slightly less than PolyTerra; harder PLA blend

[autoloader_pa_line:Polymaker:PolyMax_PETG]
pressure_advance: 0.062

[autoloader_pa_line:Prusament:PLA]
pressure_advance: 0.040

[autoloader_pa_line:Prusament:PETG]
pressure_advance: 0.058

[autoloader_pa_line:eSun:PLA+]
pressure_advance: 0.042

[autoloader_pa_line:Hatchbox:PLA]
pressure_advance: 0.036

[autoloader_pa_line:Bambu:PLA_Basic]
pressure_advance: 0.040

[autoloader_pa_line:Bambu:PETG_HF]
pressure_advance: 0.055


# ─────────────────────────────────────────────────────────────────
# User-editable per-tool calibration overrides
#
# These would be written by `SA_CALIBRATE_PA TOOL=N` (a future macro)
# at the bottom of parameters.cfg via SAVE_CONFIG. Same lookup chain
# as everything else managed by the autoloader.
#
# Example (DON'T set manually; let SA_CALIBRATE_PA write them):
#
#   #*# [autoloader]
#   #*# pa_override_T0 = 0.048
#   #*# pa_override_T1 = 0.042
#
# The override beats the brand+line value, beats the per-material
# default. Lets a user fix one persistently weird spool without
# editing the brand database.
# ─────────────────────────────────────────────────────────────────


