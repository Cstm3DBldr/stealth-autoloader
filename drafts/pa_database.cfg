# Resolve the PA value for tool N using the layered lookup. Returns
# the value as a gcode-macro variable. Caller does the SET.
#
# [gcode_macro _SA_RESOLVE_PA]
# gcode:
#     {% set t = params.TOOL|int %}
#     {% set sa = printer["autoloader"] %}
#     {% set override = printer["save_variables"]["pa_override_t" ~ t]|default(none) %}
#     {% if override is not none %}
#         {% set pa = override %}
#     {% else %}
#         {% set brand = sa["path_brands"][t] %}
#         {% set line  = sa["path_lines"][t] %}
#         {% set sect  = "autoloader_pa_line:" ~ brand ~ ":" ~ line %}
#         ... lookup logic ...
#     {% endif %}
#     SET_GCODE_VARIABLE MACRO=_SA_RESOLVE_PA VARIABLE=value VALUE={pa}


# Apply on load. Called by autoloader.py at the end of SA_LOAD.
#
# [gcode_macro _SA_APPLY_PA]
# gcode:
#     {% set t = params.TOOL|int %}
#     _SA_RESOLVE_PA TOOL={t}
#     {% set pa = printer["gcode_macro _SA_RESOLVE_PA"].value|float %}
#     SET_PRESSURE_ADVANCE EXTRUDER=extruder{ '' if t==0 else t } ADVANCE={pa}
#     RESPOND TYPE=command MSG="T{t} pressure_advance set to {pa}"


