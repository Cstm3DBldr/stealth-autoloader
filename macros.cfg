# Stealth Autoloader macros - call from console or slicer
# No massive rework - just include this file

[gcode_macro FILAMENT_LOAD]
description: Load filament using entry + buffer sensors (tool 0 for now)
gcode:
    FILAMENT_LOAD

[gcode_macro FILAMENT_UNLOAD]
description: Unload filament back to roll
gcode:
    FILAMENT_UNLOAD

[gcode_macro BUFFER_CONTROL_ON]
description: Placeholder - buffer auto control coming in next update
gcode:
    RESPOND MSG="Buffer control enabled (Python backend)"
