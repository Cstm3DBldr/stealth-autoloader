[sa_led_animator]
# Background "breathing" pulse on every UNLOADED toolhead's logo LED
# while the printer is idle. Pauses cleanly during prints (idle_timeout
# state == 'Printing') and during any autoloader operation (cal_state
# non-empty). Lives in klipper/extras/sa_led_animator.py.
#
# Defaults are: 4-second cycle, peaks at ~50% white brightness, 15 Hz
# tick rate (60 steps per cycle), 22% LERP smoothing per tick.
# Uncomment any line to override.
#breathing_period:  4.0
#max_brightness:    0.40
#min_brightness:    0.0
update_rate_hz:    15.0
smoothing_factor:  0.22


[delayed_gcode _SA_LEDS_STARTUP]
# Belt-and-suspenders fallback. The autoloader Python extra calls
# _SA_LEDS_INIT_ALL directly from its `_init_hardware` callback as
# soon as profiles are restored from save_variables — that's the
# normal path and runs within ~0.1s of klippy:ready. This delayed_gcode
# only fires if that immediate call fails (e.g. macro names not
# resolvable yet because of include order). 2 seconds is enough for
# any out-of-order startup to settle without leaving the user staring
# at blank-white toolheads for long.
initial_duration: 2.0
gcode:
    _SA_LEDS_INIT_ALL


# ─────────────────────────────────────────────────────────────────
# TODO — multi-color filament fade (NOT YET ENABLED)
# ─────────────────────────────────────────────────────────────────
#
# When a path has color_type=dual or color_type=tri, the PARKED logo
# should fade between the 2 or 3 colors instead of just showing the
# primary. Sketch:
#
#   [gcode_macro _sa_fade_state_t<N>]   <- one bag per toolhead
#   variable_active: 0
#   variable_idx: 0
#   variable_count: 1
#   gcode:
#
#   [delayed_gcode _sa_fade_t<N>]
#   gcode:
#       {% set s = printer["gcode_macro _sa_fade_state_t<N>"] %}
#       {% if s.active == 1 %}
#           _sa_set_logo_filament TOOL=<N> COLOR_INDEX={s.idx}
#           {% set next = (s.idx + 1) % s.count %}
#           SET_GCODE_VARIABLE MACRO=_sa_fade_state_t<N> VARIABLE=idx VALUE={next}
