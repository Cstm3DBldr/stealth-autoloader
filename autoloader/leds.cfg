# Autoloader toolhead LED status — refactored to follow the upstream
# Voron `stealthburner_leds.cfg` pattern: a `_sa_led_vars` config bag
# holds the colors dict and chain naming, internal helpers do the
# state-by-name lookup, and the public macros are thin wrappers.
#
# Differences from upstream stealthburner_leds.cfg:
#   - Per-toolhead instead of single-toolhead. Every public macro
#     takes TOOL=N and resolves to the "et<N>_leds" chain.
#   - One additional state ("loaded") that uses the filament's color
#     from autoloader.path_color_hexes[N] instead of a fixed value
#     from the colors dict.
#   - Public macros stay namespaced as _SA_LED_* so they don't
#     collide if upstream STATUS_* is also imported.
#
# IMPORTANT: do NOT use a literal '#' character inside any jinja
# block in this file. Klipper's config parser strips '#' as a line
# comment marker BEFORE the jinja engine sees the template — anything
# after '#' on the same line gets silently truncated, and the
# remaining jinja becomes a syntax error on load. To detect a leading
# '#' on a hex color, check `|length == 7` instead of `.startswith('#')`.
#
# Multi-color filament TODO:
#   - autoloader status exposes color_type_<N> (single/dual/tri),
#     color_hex_2_<N>, color_hex_3_<N> — already populated by
#     SA_SET_MATERIAL.
#   - PARKED state for a multi-color path should fade the logo between
#     the 2 or 3 colors via a [delayed_gcode] tick. Sketched as a
#     comment block at the bottom of this file but NOT enabled.
#     Single-color paths show their primary color statically; that's
#     the only path covered today.

# RGBW vs RGB: every SET_LED call passes WHITE=N alongside RGB. On a
# GRB strip the WHITE channel is silently ignored; on a GRBW strip
# it's used. Same code works for both — flipping color_order in
# the [neopixel] block is the only change if hardware moves to RGBW.


# ─────────────────────────────────────────────────────────────────
# Config bag — colors, chain naming, LED indexes
# ─────────────────────────────────────────────────────────────────

[gcode_macro _sa_led_vars]
# State -> RGBW color, separately for logo and nozzle. Adjust here to
# change the visual treatment without editing the macros below.
#
# Logo states:
#   active   - tool mounted on carriage          -> full white
#   unloaded - tool docked, path empty           -> dim white (parked-empty)
#   error    - slip / sensor mismatch            -> solid red
#   off      - explicit off                      -> 0,0,0,0
#   loading  - during SA_LOAD (half-saturation handled inline,
#              no entry needed in this dict)
#
# Nozzle states:
#   on       - full white (printing / active tool)
#   off      - off (parked, loading, etc.)
#   error    - dim red (matches logo error)
variable_colors: {
        'logo': {
            'active':   {'r': 1.0,  'g': 1.0,  'b': 1.0,  'w': 1.0 },
            'unloaded': {'r': 0.10, 'g': 0.10, 'b': 0.10, 'w': 0.10},
            'error':    {'r': 1.0,  'g': 0.0,  'b': 0.0,  'w': 0.0 },
            'off':      {'r': 0.0,  'g': 0.0,  'b': 0.0,  'w': 0.0 },
        },
        'nozzle': {
            'on':       {'r': 1.0, 'g': 1.0, 'b': 1.0, 'w': 1.0},
            'off':      {'r': 0.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},
            'error':    {'r': 0.3, 'g': 0.0, 'b': 0.0, 'w': 0.0},
        },
    }
# Each toolhead's LED chain is named `<prefix><N><suffix>` (this
# printer: et0_leds, et1_leds, ..., et5_leds). Edit if the naming
# convention changes.
variable_led_prefix: "et"
variable_led_suffix: "_leds"
# Chain-relative indexes — VERIFIED on this printer 2026-05-06 via the
# _SA_LED_TEST_T0 diagnostic at the bottom of this file. The chain on
# this build is wired in REVERSE of the upstream Voron StealthBurner
# stock order: indexes 1 and 2 are the nozzle LEDs (illuminate the
# print), index 3 is the Voron logo on the front of the toolhead.
# If a future toolhead is wired the standard way, swap these two
# values back to logo_idx="1" / nozzle_idx="2,3".
variable_logo_idx: "3"
variable_nozzle_idx: "1,2"
gcode:
    # Required by Klipper for any [gcode_macro] block.


# ─────────────────────────────────────────────────────────────────
# Internal helpers
# ─────────────────────────────────────────────────────────────────

[gcode_macro _sa_set_leds]
# Set a comma-separated list of LED indexes on tool N to a specific
# RGBW value. TRANSMIT applies only to the LAST index in the list,
# previous indexes get TRANSMIT=0 so the chain updates atomically.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set v = printer["gcode_macro _sa_led_vars"] %}
    {% set led = v.led_prefix ~ t|string ~ v.led_suffix %}
    {% set idx = (params.IDX|string).split(',') %}
    {% set red = params.RED|default(0)|float %}
    {% set green = params.GREEN|default(0)|float %}
    {% set blue = params.BLUE|default(0)|float %}
    {% set white = params.WHITE|default(0)|float %}
    {% set transmit_last = params.TRANSMIT|default(1)|int %}
    {% for li in idx %}
        {% set tx = transmit_last if loop.last else 0 %}
        SET_LED LED={led} INDEX={li|trim} RED={red} GREEN={green} BLUE={blue} WHITE={white} TRANSMIT={tx}
    {% endfor %}


[gcode_macro _sa_set_logo_by_state]
# Set the logo (index 1) on tool N to the named state's color from
# _sa_led_vars.colors.logo. Required: TOOL, STATE.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set state = params.STATE|string %}
    {% set v = printer["gcode_macro _sa_led_vars"] %}
    {% set c = v.colors.logo[state] %}
    {% set tx = params.TRANSMIT|default(1)|int %}
    _sa_set_leds TOOL={t} IDX={v.logo_idx} RED={c.r} GREEN={c.g} BLUE={c.b} WHITE={c.w} TRANSMIT={tx}


[gcode_macro _sa_set_nozzle_by_state]
# Set the nozzle (indexes 2,3) on tool N to the named state's color
# from _sa_led_vars.colors.nozzle. Required: TOOL, STATE.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set state = params.STATE|string %}
    {% set v = printer["gcode_macro _sa_led_vars"] %}
    {% set c = v.colors.nozzle[state] %}
    {% set tx = params.TRANSMIT|default(1)|int %}
    _sa_set_leds TOOL={t} IDX={v.nozzle_idx} RED={c.r} GREEN={c.g} BLUE={c.b} WHITE={c.w} TRANSMIT={tx}


[gcode_macro _sa_set_logo_filament]
# Set the logo on tool N to the autoloader's stored filament color for
# that path. Required: TOOL. Optional: COLOR_INDEX (0=primary,
# 1=secondary, 2=tertiary — for multi-color filaments). SCALE applies
# a brightness multiplier (0.0-1.0); used by _SA_LED_LOADING for
# half-saturation pulse.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set ci = params.COLOR_INDEX|default(0)|int %}
    {% set scale = params.SCALE|default(1.0)|float %}
    {% set sa = printer["autoloader"] %}
    {% if ci == 0 %}
        {% set hexes = sa.path_color_hexes|default([]) %}
        {% set hex_c = (hexes[t] if t < hexes|length else "")|string %}
    {% elif ci == 1 %}
        {% set hex_c = sa["color_hex_2_" ~ t|string]|default("")|string %}
    {% else %}
        {% set hex_c = sa["color_hex_3_" ~ t|string]|default("")|string %}
    {% endif %}
    {% if hex_c|length == 7 %}{% set hex_c = hex_c[1:] %}{% endif %}
    {% if hex_c|length != 6 %}{% set hex_c = "FFFFFF" %}{% endif %}
    {% set r = (hex_c[0:2]|int(0, 16)) / 255.0 * scale %}
    {% set g = (hex_c[2:4]|int(0, 16)) / 255.0 * scale %}
    {% set b = (hex_c[4:6]|int(0, 16)) / 255.0 * scale %}
    {% set v = printer["gcode_macro _sa_led_vars"] %}
    {% set tx = params.TRANSMIT|default(1)|int %}
    _sa_set_leds TOOL={t} IDX={v.logo_idx} RED={r} GREEN={g} BLUE={b} WHITE=0 TRANSMIT={tx}


# ─────────────────────────────────────────────────────────────────
# Public state macros
# ─────────────────────────────────────────────────────────────────

# Until Stage 2 is implemented, every public state macro keeps the
# nozzle LEDs (indexes 1 and 2) at white — only the logo (index 3)
# carries state. Stage 2 will replace the `STATE=on` nozzle calls
# below with state-specific colors (heating / printing / busy / etc.).

[gcode_macro _SA_LED_PARKED]
description: Logo lit with filament color, nozzle white. Tool docked, path loaded.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    _sa_set_logo_filament  TOOL={t} COLOR_INDEX=0 TRANSMIT=0
    _sa_set_nozzle_by_state TOOL={t} STATE=on


[gcode_macro _SA_LED_UNLOADED]
description: Logo dim white, nozzle white. Tool docked, path empty.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    _sa_set_logo_by_state   TOOL={t} STATE=unloaded TRANSMIT=0
    _sa_set_nozzle_by_state TOOL={t} STATE=on


[gcode_macro _SA_LED_ACTIVE]
description: Logo white, nozzle white. Tool mounted on carriage.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    _sa_set_logo_by_state   TOOL={t} STATE=active TRANSMIT=0
    _sa_set_nozzle_by_state TOOL={t} STATE=on


[gcode_macro _SA_LED_LOADING]
description: Logo at half-saturation filament color, nozzle white. During SA_LOAD.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    _sa_set_logo_filament  TOOL={t} COLOR_INDEX=0 SCALE=0.5 TRANSMIT=0
    _sa_set_nozzle_by_state TOOL={t} STATE=on


[gcode_macro _SA_LED_ERROR]
description: Solid red logo, nozzle white. Slip / sensor mismatch.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    _sa_set_logo_by_state   TOOL={t} STATE=error TRANSMIT=0
    _sa_set_nozzle_by_state TOOL={t} STATE=on


# ─────────────────────────────────────────────────────────────────
# State-driven auto-picker + bulk refresh
# ─────────────────────────────────────────────────────────────────

[gcode_macro _SA_LED_FROM_STATE]
description: Auto-pick ACTIVE / PARKED / UNLOADED for tool N from
  autoloader status and current toolchanger state. Prefer ACTIVE if
  the tool is currently mounted on the carriage; then PARKED with
  filament color if the path has one; else UNLOADED dim white.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set active = printer.tool_probe_endstop.active_tool_number|default(-1)|int %}
    {% set hexes = printer["autoloader"].path_color_hexes|default([]) %}
    {% set hex_c = (hexes[t] if t < hexes|length else "")|string %}
    {% if t == active %}
        _SA_LED_ACTIVE TOOL={t}
    {% elif hex_c %}
        _SA_LED_PARKED TOOL={t}
    {% else %}
        _SA_LED_UNLOADED TOOL={t}
    {% endif %}


[gcode_macro _SA_LEDS_INIT_ALL]
description: Set every toolhead's LEDs based on autoloader state. The
  ACTIVE param explicitly names which tool is currently mounted on the
  carriage; if not supplied, falls back to tool_probe_endstop's
  detection. Active tool gets _SA_LED_ACTIVE, every other tool gets
  _SA_LED_FROM_STATE.
gcode:
    {% set num = printer["autoloader"].num_paths|default(6)|int %}
    {% if 'ACTIVE' in params %}
        {% set active = params.ACTIVE|int %}
    {% else %}
        {% set active = printer.tool_probe_endstop.active_tool_number|default(-1)|int %}
    {% endif %}
    {% for t in range(num) %}
        {% if t == active %}
            _SA_LED_ACTIVE TOOL={t}
        {% else %}
            _SA_LED_FROM_STATE TOOL={t}
        {% endif %}
    {% endfor %}


# ─────────────────────────────────────────────────────────────────
# Startup trigger
# ─────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────
# Diagnostic — index mapping test
# ─────────────────────────────────────────────────────────────────

[gcode_macro _SA_LED_TEST_T0]
description: Lights T0's 3-LED chain with three distinct colors so the
  user can visually identify which physical LED is which:
    INDEX=1 -> GREEN
    INDEX=2 -> BLUE
    INDEX=3 -> RED
  Klipper's SET_LED INDEX is documented as 1-based. If running this
  leaves any LED dark while another is unexpectedly green/blue/red,
  the mapping is off. Report back which color landed on which physical
  LED — logo, top nozzle, bottom nozzle.
gcode:
    SET_LED LED=et0_leds INDEX=1 RED=0 GREEN=1 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et0_leds INDEX=2 RED=0 GREEN=0 BLUE=1 WHITE=0 TRANSMIT=0
    SET_LED LED=et0_leds INDEX=3 RED=1 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1
    RESPOND TYPE=command MSG="T0 LED test: INDEX 1=GREEN, 2=BLUE, 3=RED. Note which physical LED (logo / nozzle-top / nozzle-bottom) shows which color."


[delayed_gcode _SA_LEDS_STARTUP]
# Belt-and-suspenders fallback. The autoloader Python extra calls
# _SA_LEDS_INIT_ALL directly from its `_init_hardware` callback as
# soon as profiles are restored from save_variables — that's the
# normal path and runs within ~0.1s of klippy:ready. This delayed_gcode
# only fires if that immediate call fails (e.g. macro names not
# resolvable yet because of include order). 2 seconds is enough for
# any out-of-order startup to settle without leaving the user staring
# at blank-white toolheads for long.
initial_duration: 2.0
gcode:
    _SA_LEDS_INIT_ALL


# ─────────────────────────────────────────────────────────────────
# STAGE 2 — printing-status states on the nozzle LEDs (NOT YET BUILT)
# ─────────────────────────────────────────────────────────────────
#
# Stage 1 (this file): logo lights up the filament color, nozzle LEDs
# go on/off based on whether the tool is mounted. Done.
#
# Stage 2: while a print is running, the active toolhead's nozzle LEDs
# (indexes 2 and 3) animate to indicate what the printer is doing.
# Mirrors upstream stealthburner_leds.cfg's STATUS_HEATING / BUSY /
# HOMING / LEVELING / MESHING / CLEANING / CALIBRATING_Z / PRINTING.
# Logo continues to show filament color throughout.
#
# What needs to land for Stage 2:
#
#   1. Expand `_sa_led_vars.colors.nozzle` with state entries:
#        heating       orange   {'r': 0.8, 'g': 0.35, 'b': 0.0,  'w': 0.0}
#        printing      white    (already covered as 'on')
#        busy          red      {'r': 0.4, 'g': 0.0,  'b': 0.0,  'w': 0.0}
#        homing        green    {'r': 0.0, 'g': 0.6,  'b': 0.2,  'w': 0.0}
#        leveling      purple   {'r': 0.5, 'g': 0.1,  'b': 0.4,  'w': 0.0}
#        meshing       lime     {'r': 0.2, 'g': 1.0,  'b': 0.0,  'w': 0.0}
#        cleaning      cyan     {'r': 0.0, 'g': 0.02, 'b': 0.5,  'w': 0.0}
#        calibrating_z magenta  {'r': 0.8, 'g': 0.0,  'b': 0.35, 'w': 0.0}
#
#   2. Add public macros that operate on whichever tool is currently
#      active (no TOOL=N param needed since only the mounted tool is
#      visible while printing):
#        STATUS_HEATING / STATUS_PRINTING / STATUS_BUSY / etc.
#      Each resolves the active tool from
#      `printer.tool_probe_endstop.active_tool_number`, then calls
#      `_sa_set_nozzle_by_state TOOL={active} STATE=<name>`.
#      The logo stays on its filament color (already set by
#      _SA_LED_FROM_STATE on the last toolchange) — these macros
#      ONLY touch the nozzle LEDs.
#
#   3. Add STATUS_* calls inside the existing macros in macros.cfg:
#        PRINT_START   -> STATUS_HEATING ... STATUS_PRINTING
#        PRINT_END     -> STATUS_READY (parked/active per state)
#        PAUSE / M600  -> STATUS_BUSY
#        RESUME        -> STATUS_PRINTING
#        QUAD_GANTRY_LEVEL / G32  -> STATUS_LEVELING
#        BED_MESH_CALIBRATE       -> STATUS_MESHING
#        _CLEAN_NOZZLE / _WIPE_NOZZLE -> STATUS_CLEANING
#        G28 / homing -> STATUS_HOMING
#
#   4. Make sure every STATUS_* call has a paired return-to-normal at
#      the end of its host macro (or in an error-handling exit path),
#      otherwise the nozzle gets stuck in e.g. STATUS_HEATING forever.
#      Pattern matches stealthburner_leds.cfg's per-macro wrapping.
#
# Estimated effort: 1-2 hours including testing. Single file edit
# (this leds.cfg) plus targeted insertions into macros.cfg.


# ─────────────────────────────────────────────────────────────────
# TODO — multi-color filament fade (NOT YET ENABLED)
# ─────────────────────────────────────────────────────────────────
#
# When a path has color_type=dual or color_type=tri, the PARKED logo
# should fade between the 2 or 3 colors instead of just showing the
# primary. Sketch:
#
#   [gcode_macro _sa_fade_state_t<N>]   <- one bag per toolhead
#   variable_active: 0
#   variable_idx: 0
#   variable_count: 1
#   gcode:
#
#   [delayed_gcode _sa_fade_t<N>]
#   gcode:
#       {% set s = printer["gcode_macro _sa_fade_state_t<N>"] %}
#       {% if s.active == 1 %}
#           _sa_set_logo_filament TOOL=<N> COLOR_INDEX={s.idx}
#           {% set next = (s.idx + 1) % s.count %}
#           SET_GCODE_VARIABLE MACRO=_sa_fade_state_t<N> VARIABLE=idx VALUE={next}
#           UPDATE_DELAYED_GCODE ID=_sa_fade_t<N> DURATION=2.0
#       {% endif %}
#
# Then _SA_LED_PARKED would check sa.color_type_<N>; if dual or tri,
# set count and active=1 on the per-tool fade-state bag and start the
# delayed_gcode. STATUS_OFF / _SA_LED_UNLOADED / _SA_LED_ACTIVE all
# need to set active=0 on every tool's bag they touch so the fade
# doesn't keep ticking after the visible state has moved on.
#
# Klipper config is static — needs 6 instances of the bag and
# delayed_gcode (one per tool). Tedious but straightforward; will
# generate via a small templating step when implementing.
