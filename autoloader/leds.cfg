# Toolhead Voron logo + nozzle LED status macros.
#
# Each toolhead has a 3-LED chain on its EBB (configured in
# Toolchanger/Tool-Heads/T*.cfg as [neopixel et<N>_leds], chain_count: 3,
# color_order: GRB). Voron StealthBurner standard:
#   INDEX=1 -> Voron logo on the front
#   INDEX=2 -> nozzle LED (one)
#   INDEX=3 -> nozzle LED (two)
# (Klipper SET_LED INDEX is 1-based.)
#
# Color source for parked tools is the autoloader's per-path
# path_color_hexes list — same data the load/unload UI shows. So when
# you LOAD a yellow PLA into T2, T2's logo lights yellow when parked.
#
# RGBW compatibility: every SET_LED call passes WHITE=N alongside RGB.
# On a GRB strip the WHITE channel is silently ignored; on a GRBW strip
# it's used. Same macros work for both wirings — only color_order in
# the [neopixel] block needs changing if hardware changes.
#
# IMPORTANT: do NOT use a literal '#' character inside any jinja block
# in this file. Klipper's config parser strips '#' as a comment marker
# BEFORE the jinja engine sees the template — anything after a '#' on
# the same line (including the rest of a `{%...%}` expression) is
# silently truncated, and the remaining jinja becomes a syntax error
# on load. To detect a leading '#' on a hex color, check `|length == 7`
# instead of `.startswith('#')`.

# ─────────────────────────────────────────────────────────────────
# Per-state public macros (TOOL=N is required, COLOR=#RRGGBB optional)
# ─────────────────────────────────────────────────────────────────

[gcode_macro _SA_LED_PARKED]
description: Logo lit with filament color, nozzle LEDs off. Tool docked.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set hex_c = params.COLOR|default("")|string %}
    {% if hex_c|length == 7 %}{% set hex_c = hex_c[1:] %}{% endif %}
    {% if hex_c|length != 6 %}{% set hex_c = "FFFFFF" %}{% endif %}
    {% set r = (hex_c[0:2]|int(0, 16)) / 255.0 %}
    {% set g = (hex_c[2:4]|int(0, 16)) / 255.0 %}
    {% set b = (hex_c[4:6]|int(0, 16)) / 255.0 %}
    SET_LED LED=et{t}_leds INDEX=1 RED={r} GREEN={g} BLUE={b} WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=2 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1


[gcode_macro _SA_LED_UNLOADED]
description: Logo dim white, nozzle off. Path is empty / awaiting load.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    SET_LED LED=et{t}_leds INDEX=1 RED=0.10 GREEN=0.10 BLUE=0.10 WHITE=0.10 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=2 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1


[gcode_macro _SA_LED_ACTIVE]
description: Tool mounted on carriage. All 3 LEDs full white for printing.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    SET_LED LED=et{t}_leds INDEX=1 RED=1 GREEN=1 BLUE=1 WHITE=1 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=2 RED=1 GREEN=1 BLUE=1 WHITE=1 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=1 GREEN=1 BLUE=1 WHITE=1 TRANSMIT=1


[gcode_macro _SA_LED_LOADING]
description: Half-saturation filament color during SA_LOAD. Nozzle off.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set hex_c = params.COLOR|default("")|string %}
    {% if hex_c|length == 7 %}{% set hex_c = hex_c[1:] %}{% endif %}
    {% if hex_c|length != 6 %}{% set hex_c = "FFFFFF" %}{% endif %}
    {% set r = (hex_c[0:2]|int(0, 16)) / 255.0 * 0.5 %}
    {% set g = (hex_c[2:4]|int(0, 16)) / 255.0 * 0.5 %}
    {% set b = (hex_c[4:6]|int(0, 16)) / 255.0 * 0.5 %}
    SET_LED LED=et{t}_leds INDEX=1 RED={r} GREEN={g} BLUE={b} WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=2 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1


[gcode_macro _SA_LED_ERROR]
description: Solid red — slip detected, sensor mismatch, etc.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    SET_LED LED=et{t}_leds INDEX=1 RED=1 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=2 RED=0.3 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=et{t}_leds INDEX=3 RED=0.3 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1


# ─────────────────────────────────────────────────────────────────
# Convenience: pick parked vs unloaded automatically from autoloader
# state. Reads autoloader.path_color_hexes[t] — empty string -> dim
# white "unloaded" treatment, hex string -> filament-color "parked"
# treatment.
# ─────────────────────────────────────────────────────────────────

[gcode_macro _SA_LED_FROM_STATE]
description: Auto-pick ACTIVE / PARKED / UNLOADED for tool N from
  autoloader status and current toolchanger state. Prefer ACTIVE if
  the tool is currently mounted on the carriage (tool_probe_endstop
  reports it active), then PARKED with filament color if the path has
  one, else UNLOADED dim white.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set active = printer.tool_probe_endstop.active_tool_number|default(-1)|int %}
    {% set hexes = printer["autoloader"].path_color_hexes|default([]) %}
    {% set hex_c = hexes[t] if t < hexes|length else "" %}
    {% if t == active %}
        _SA_LED_ACTIVE TOOL={t}
    {% elif hex_c %}
        _SA_LED_PARKED TOOL={t} COLOR="{hex_c}"
    {% else %}
        _SA_LED_UNLOADED TOOL={t}
    {% endif %}


# ─────────────────────────────────────────────────────────────────
# Init-all helper. Loops every path and applies state-driven LEDs.
# Used at startup and whenever we want to refresh everything.
# ─────────────────────────────────────────────────────────────────

[gcode_macro _SA_LEDS_INIT_ALL]
description: Set every toolhead's LEDs based on autoloader state. The
  ACTIVE param explicitly names which tool is currently mounted on the
  carriage; if not supplied, falls back to tool_probe_endstop's
  detection. Active tool gets _SA_LED_ACTIVE, every other tool gets
  _SA_LED_FROM_STATE (PARKED with color or UNLOADED dim white).
gcode:
    {% set num = printer["autoloader"].num_paths|default(6)|int %}
    {% if 'ACTIVE' in params %}
        {% set active = params.ACTIVE|int %}
    {% else %}
        {% set active = printer.tool_probe_endstop.active_tool_number|default(-1)|int %}
    {% endif %}
    {% for t in range(num) %}
        {% if t == active %}
            _SA_LED_ACTIVE TOOL={t}
        {% else %}
            _SA_LED_FROM_STATE TOOL={t}
        {% endif %}
    {% endfor %}


# ─────────────────────────────────────────────────────────────────
# Startup trigger — fires ~5s after Klipper ready so autoloader status
# and tool_probe_endstop have populated. Klipper's default LED state
# is full white from initial_RED/GREEN/BLUE in each [neopixel] block,
# so without this delayed init the toolheads would all show white
# until the first toolchange.
# ─────────────────────────────────────────────────────────────────
[delayed_gcode _SA_LEDS_STARTUP]
initial_duration: 5.0
gcode:
    _SA_LEDS_INIT_ALL
