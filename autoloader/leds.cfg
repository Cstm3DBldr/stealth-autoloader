# Autoloader toolhead LED status — refactored to follow the upstream
# Voron `stealthburner_leds.cfg` pattern: a `_sa_led_vars` config bag
# holds the colors dict and chain naming, internal helpers do the
# state-by-name lookup, and the public macros are thin wrappers.
#
# Differences from upstream stealthburner_leds.cfg:
#   - Per-toolhead instead of single-toolhead. Every public macro
#     takes TOOL=N and resolves to the "et<N>_leds" chain.
#   - One additional state ("loaded") that uses the filament's color
#     from autoloader.path_color_hexes[N] instead of a fixed value
#     from the colors dict.
#   - Public macros stay namespaced as _SA_LED_* so they don't
#     collide if upstream STATUS_* is also imported.
#
# IMPORTANT: do NOT use a literal '#' character inside any jinja
# block in this file. Klipper's config parser strips '#' as a line
# comment marker BEFORE the jinja engine sees the template — anything
# after '#' on the same line gets silently truncated, and the
# remaining jinja becomes a syntax error on load. To detect a leading
# '#' on a hex color, check `|length == 7` instead of `.startswith('#')`.
#
# Multi-color filament TODO:
#   - autoloader status exposes color_type_<N> (single/dual/tri),
#     color_hex_2_<N>, color_hex_3_<N> — already populated by
#     SA_SET_MATERIAL.
#   - PARKED state for a multi-color path should fade the logo between
#     the 2 or 3 colors via a [delayed_gcode] tick. Sketched as a
#     comment block at the bottom of this file but NOT enabled.
#     Single-color paths show their primary color statically; that's
#     the only path covered today.

# RGBW vs RGB: every SET_LED call passes WHITE=N alongside RGB. On a
# GRB strip the WHITE channel is silently ignored; on a GRBW strip
# it's used. Same code works for both — flipping color_order in
# the [neopixel] block is the only change if hardware moves to RGBW.

# ─────────────────────────────────────────────────────────────────
# v5 calibrated rainbow reference (2026-05-06)
# ─────────────────────────────────────────────────────────────────
# Empirical RGB values that produce visually-accurate hues on this
# build's WS2812B/SK6812-based LEDs. Calibrated against the
# _SA_LED_TEST_CASELIGHT macro across 5 iterations. The chip's
# green LED is roughly 1.5-2x brighter perceptually than red/blue
# at the same digital value, so HSV-pure RGB triplets render too
# yellow/green; this palette compensates.
#
# Reference only — these are the anchor points used during initial
# calibration and are kept for re-verification if hardware changes.
# The LIVE rendering pipeline in `_sa_set_logo_filament` is different:
# it applies sRGB gamma 2.2 plus a softer green correction (g x 0.85
# when green is not dominant). The combined gamma+0.85 produces
# perceptually equivalent dimming on warm hues to v5's no-gamma+0.55,
# but with a perceptually-uniform brightness ramp across the hex
# range and noticeably better mid-tone brown rendering.
#
#   Hue   Name        RGB (0-1)             Hex equivalent
#   ----  ----------  --------------------  ---------------
#     0   Red         0.40 / 0.00 / 0.00    #660000
#    21   Vermilion   0.40 / 0.06 / 0.00    #660F00
#    42   Orange      0.40 / 0.10 / 0.00    #661900
#    63   Yellow      0.38 / 0.40 / 0.00    #616600
#    85   Lime        0.23 / 0.40 / 0.00    #3B6600
#   106   Green       0.05 / 0.40 / 0.00    #0D6600
#   127   Emerald     0.00 / 0.40 / 0.07    #006612
#   148   Spring      0.00 / 0.35 / 0.25    #005940
#   169   Turquoise   0.00 / 0.30 / 0.38    #004D61
#   190   Cyan        0.00 / 0.25 / 0.40    #004066
#   211   Sky         0.00 / 0.15 / 0.40    #002666
#   232   Blue        0.00 / 0.00 / 0.40    #000066
#   254   Indigo      0.09 / 0.00 / 0.40    #170066
#   275   Violet      0.23 / 0.00 / 0.40    #3B0066
#   296   Magenta     0.37 / 0.00 / 0.40    #5E0066
#   317   Pink        0.40 / 0.00 / 0.29    #66004A
#   338   Rose        0.40 / 0.00 / 0.07    #660012


# ─────────────────────────────────────────────────────────────────
# Config bag — colors, chain naming, LED indexes
# ─────────────────────────────────────────────────────────────────

[gcode_macro _sa_led_vars]
# State -> RGBW color, separately for logo and nozzle. Adjust here to
# change the visual treatment without editing the macros below.
#
# Logo states:
#   active   - tool mounted on carriage          -> full white
#   unloaded - tool docked, path empty           -> dim white (parked-empty)
#   error    - slip / sensor mismatch            -> solid red
#   off      - explicit off                      -> 0,0,0,0
#   loading  - during SA_LOAD (half-saturation handled inline,
#              no entry needed in this dict)
#
# Nozzle states (used by STATUS_* macros — see "Stage 2" public macros
# below). Picked to be vivid enough to read across the print bay and
# distinct enough that even at a glance you can tell the printer's
# phase. Roughly follows the upstream stealthburner palette with a few
# tweaks.
variable_colors: {
        'logo': {
            'unloaded': {'r': 0.10, 'g': 0.10, 'b': 0.10, 'w': 0.10},
            'error':    {'r': 1.0,  'g': 0.0,  'b': 0.0,  'w': 0.0 },
            'off':      {'r': 0.0,  'g': 0.0,  'b': 0.0,  'w': 0.0 },
        },
        'nozzle': {
            'off':           {'r': 0.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},  # explicit OFF override (STATUS_OFF)
            'parked_cold':   {'r': 0.0, 'g': 0.0, 'b': 0.25,'w': 0.0},  # tool docked on cooling pad, cold/idle (default for parked tools)
            'ready':         {'r': 1.0, 'g': 1.0, 'b': 1.0, 'w': 1.0},  # active tool, idle/printing
            'heating':       {'r': 1.0, 'g': 0.25,'b': 0.0, 'w': 0.0},  # red-orange (heat warning)
            'printing':      {'r': 1.0, 'g': 1.0, 'b': 1.0, 'w': 1.0},  # bright white (== ready)
            'busy':          {'r': 1.0, 'g': 0.5, 'b': 0.0, 'w': 0.0},  # amber (pause / M600)
            'homing':        {'r': 0.0, 'g': 0.6, 'b': 0.2, 'w': 0.0},  # green
            'leveling':      {'r': 0.5, 'g': 0.1, 'b': 0.5, 'w': 0.0},  # purple
            'meshing':       {'r': 0.0, 'g': 0.7, 'b': 0.4, 'w': 0.0},  # teal
            'cleaning':      {'r': 0.0, 'g': 0.6, 'b': 0.6, 'w': 0.0},  # cyan
            'calibrating_z': {'r': 0.7, 'g': 0.0, 'b': 0.4, 'w': 0.0},  # magenta
            'error':         {'r': 0.3, 'g': 0.0, 'b': 0.0, 'w': 0.0},  # dim red
        },
    }
# Each toolhead's LED chain is named `<prefix><N><suffix>` (this
# printer: et0_leds, et1_leds, ..., et5_leds). Edit if the naming
# convention changes.
variable_led_prefix: "et"
variable_led_suffix: "_leds"
# Chain-relative indexes — VERIFIED on this printer 2026-05-06 via the
# _SA_LED_TEST_T0 diagnostic at the bottom of this file. The chain on
# this build is wired in REVERSE of the upstream Voron StealthBurner
# stock order: indexes 1 and 2 are the nozzle LEDs (illuminate the
# print), index 3 is the Voron logo on the front of the toolhead.
# If a future toolhead is wired the standard way, swap these two
# values back to logo_idx="1" / nozzle_idx="2,3".
variable_logo_idx: "3"
variable_nozzle_idx: "1,2"
gcode:
    # Required by Klipper for any [gcode_macro] block.


# ─────────────────────────────────────────────────────────────────
# Internal helpers
# ─────────────────────────────────────────────────────────────────

[gcode_macro _sa_set_leds]
# Set a comma-separated list of LED indexes on tool N to a specific
# RGBW value. TRANSMIT applies only to the LAST index in the list,
# previous indexes get TRANSMIT=0 so the chain updates atomically.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set v = printer["gcode_macro _sa_led_vars"] %}
    {% set led = v.led_prefix ~ t|string ~ v.led_suffix %}
    {% set idx = (params.IDX|string).split(',') %}
    {% set red = params.RED|default(0)|float %}
    {% set green = params.GREEN|default(0)|float %}
    {% set blue = params.BLUE|default(0)|float %}
    {% set white = params.WHITE|default(0)|float %}
    {% set transmit_last = params.TRANSMIT|default(1)|int %}
    {% for li in idx %}
        {% set tx = transmit_last if loop.last else 0 %}
        SET_LED LED={led} INDEX={li|trim} RED={red} GREEN={green} BLUE={blue} WHITE={white} TRANSMIT={tx}
    {% endfor %}


[gcode_macro _sa_set_logo_by_state]
# Set the logo (index 1) on tool N to the named state's color from
# _sa_led_vars.colors.logo. Required: TOOL, STATE.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set state = params.STATE|string %}
    {% set v = printer["gcode_macro _sa_led_vars"] %}
    {% set c = v.colors.logo[state] %}
    {% set tx = params.TRANSMIT|default(1)|int %}
    _sa_set_leds TOOL={t} IDX={v.logo_idx} RED={c.r} GREEN={c.g} BLUE={c.b} WHITE={c.w} TRANSMIT={tx}


[gcode_macro _sa_set_nozzle_by_state]
# Set the nozzle (indexes 2,3) on tool N to the named state's color
# from _sa_led_vars.colors.nozzle. Required: TOOL, STATE.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set state = params.STATE|string %}
    {% set v = printer["gcode_macro _sa_led_vars"] %}
    {% set c = v.colors.nozzle[state] %}
    {% set tx = params.TRANSMIT|default(1)|int %}
    _sa_set_leds TOOL={t} IDX={v.nozzle_idx} RED={c.r} GREEN={c.g} BLUE={c.b} WHITE={c.w} TRANSMIT={tx}


[gcode_macro _sa_set_logo_filament]
# Set the logo on tool N to the autoloader's stored filament color for
# that path. Required: TOOL. Optional: COLOR_INDEX (0=primary,
# 1=secondary, 2=tertiary — for multi-color filaments).
#
# Perceptual correction pipeline — LOCKED 2026-05-06 after gamma
# calibration. WS2812B/SK6812 green LED is roughly 1.5-2x brighter
# perceptually than red or blue at the same digital value. Plus
# the human eye perceives brightness on a roughly gamma-2.2 curve,
# so a hex value of #888888 should drive the LED at 0.5^2.2 ≈ 22%
# duty (not 50% linear).
#
# Three-tier dark-color path (handled below) + green-attenuation +
# gamma combine to produce perceptually accurate filament colors
# from arbitrary hex inputs across the full brightness range.
# Tested against rainbow MAX, brown progression, and gamma grayscale
# ramps; verified visually correct for warm hues (red/orange/brown),
# cool hues (blue/purple), greens, and dark filaments down to #0A0A0A.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set ci = params.COLOR_INDEX|default(0)|int %}
    {% set sa = printer["autoloader"] %}
    {% if ci == 0 %}
        {% set hexes = sa.path_color_hexes|default([]) %}
        {% set hex_c = (hexes[t] if t < hexes|length else "")|string %}
    {% elif ci == 1 %}
        {% set hex_c = sa["color_hex_2_" ~ t|string]|default("")|string %}
    {% else %}
        {% set hex_c = sa["color_hex_3_" ~ t|string]|default("")|string %}
    {% endif %}
    {% if hex_c|length == 7 %}{% set hex_c = hex_c[1:] %}{% endif %}
    # No-hex fallback is OFF, NOT white. An empty/invalid color hex
    # means "no specific color set" — rendering it as full white
    # (the previous default) made every black filament and every
    # un-set profile light up brilliant white, which is the OPPOSITE
    # of what the user wants. With a 0-fallback, the logo is dark
    # for unset hex and the toolhead's nozzle still indicates whether
    # the tool is mounted.
    {% if hex_c|length != 6 %}{% set hex_c = "000000" %}{% endif %}
    {% set r_raw = (hex_c[0:2]|int(0, 16)) / 255.0 %}
    {% set g_raw = (hex_c[2:4]|int(0, 16)) / 255.0 %}
    {% set b_raw = (hex_c[4:6]|int(0, 16)) / 255.0 %}
    # Dark-color handling. Three tiers based on max channel value:
    #   max_ch == 0    -> pure black or empty hex, stays fully OFF
    #                     (the explicit "show nothing" signal)
    #   max_ch < 0.15  -> near-black filament (e.g. #1A1A1A,
    #                     #1C1C1C — filament DBs often store "Black"
    #                     as dark gray). Rescale so the brightest
    #                     channel is 0.03 (~3% — barely-visible
    #                     glow) while preserving the original hue
    #                     ratios. Distinguishable from "off" but
    #                     also distinguishable from a brighter
    #                     loaded color.
    #   max_ch >= 0.15 -> normal color, apply perceptual green
    #                     correction as usual.
    # 0.15 is below the lightest brown shade (#3E2723 -> max 0.24)
    # so dark browns still render via the normal correction path.
    {% set max_ch = [r_raw, g_raw, b_raw]|max %}
    {% set apply_gamma = True %}
    {% if max_ch == 0.0 %}
        # already 0,0,0
        {% set r_raw = 0.0 %}
        {% set apply_gamma = False %}
    {% elif max_ch < 0.15 %}
        # Dark filament glow — direct LED-drive value, no gamma.
        # Target 0.0075 (~2 of 255 PWM steps), already calibrated for
        # the LED's noise floor. Applying gamma 2.2 here would push
        # the value below the chip's quantization step and kill the
        # glow entirely.
        {% set rescale = 0.0075 / max_ch %}
        {% set r_raw = r_raw * rescale %}
        {% set g_raw = g_raw * rescale %}
        {% set b_raw = b_raw * rescale %}
        {% set apply_gamma = False %}
    {% else %}
        # Perceptual green-channel correction. WS2812B/SK6812 chips
        # have a green LED ~1.5-2x brighter than red/blue at the
        # same digital value, so warm hues (orange / brown / red)
        # would otherwise read too yellow-green.
        # Factor 0.85: softer than the v5-rainbow-calibrated 0.55,
        # because gamma 2.2 (applied below) already compresses small
        # channel values further. The combined effect produces
        # roughly v5-equivalent dimming on warm hues without
        # over-killing the green channel of mid-tone browns.
        {% if g_raw < r_raw or g_raw < b_raw %}
            {% set g_raw = g_raw * 0.85 %}
        {% endif %}
    {% endif %}
    {% set r = r_raw %}
    {% set g = g_raw %}
    {% set b = b_raw %}
    # Gamma 2.2 — converts perceived-brightness (the hex value) to
    # LED PWM drive. Without this, mid-range hex values like #888888
    # read as ~76% bright instead of the 50% they represent on a
    # monitor. The grayscale calibration test confirmed gamma 2.2 is
    # the right curve for this LED chain.
    {% if apply_gamma %}
        {% set r = r ** 2.2 %}
        {% set g = g ** 2.2 %}
        {% set b = b ** 2.2 %}
    {% endif %}
    {% set v = printer["gcode_macro _sa_led_vars"] %}
    {% set tx = params.TRANSMIT|default(1)|int %}
    _sa_set_leds TOOL={t} IDX={v.logo_idx} RED={r} GREEN={g} BLUE={b} WHITE=0 TRANSMIT={tx}


# ─────────────────────────────────────────────────────────────────
# Public state macros
# ─────────────────────────────────────────────────────────────────

# Base state macros — ALL set the logo to the loaded filament color
# (or dim white if no filament). The DIFFERENCE between parked and
# active is the nozzle: parked tools have nozzle OFF, active tool has
# nozzle WHITE so it visibly stands out as "the one currently doing
# work." Print phases (heating / homing / busy / etc.) come in via
# the STATUS_* macros below, which override only the nozzle on
# whichever tool is currently mounted.

[gcode_macro _SA_LED_PARKED]
description: Logo lit with filament color, nozzle dim blue. Tool docked on
  cooling pad, cold/idle. The dim blue glow distinguishes "parked + ready
  to use" from "no tool installed at all" (which stays dark).
gcode:
    {% set t = params.TOOL|default(0)|int %}
    _sa_set_logo_filament  TOOL={t} COLOR_INDEX=0 TRANSMIT=0
    _sa_set_nozzle_by_state TOOL={t} STATE=parked_cold


[gcode_macro _SA_LED_UNLOADED]
description: Logo dim white, nozzle off. Tool docked, path empty.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    _sa_set_logo_by_state   TOOL={t} STATE=unloaded TRANSMIT=0
    _sa_set_nozzle_by_state TOOL={t} STATE=off


[gcode_macro _SA_LED_ACTIVE]
description: Logo on filament color, nozzle bright white. Tool mounted on carriage.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    _sa_set_logo_filament  TOOL={t} COLOR_INDEX=0 TRANSMIT=0
    _sa_set_nozzle_by_state TOOL={t} STATE=ready


[gcode_macro _SA_LED_ERROR]
description: Solid red logo, dim red nozzle. Slip / sensor mismatch.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    _sa_set_logo_by_state   TOOL={t} STATE=error TRANSMIT=0
    _sa_set_nozzle_by_state TOOL={t} STATE=error


# ─────────────────────────────────────────────────────────────────
# Stage 2 — printing-status states on the active tool's nozzle
# ─────────────────────────────────────────────────────────────────
#
# These STATUS_* macros only change the NOZZLE LEDs (indexes 1 and 2)
# on the currently-mounted toolhead. The logo (index 3) keeps its
# filament-color base across every status — that's what makes
# multi-toolhead identification work even mid-print.
#
# All STATUS_* macros take an optional TOOL=N override. If omitted,
# they read printer.tool_probe_endstop.active_tool_number to find
# the mounted tool. If no tool is detected (active=-1), they no-op
# silently rather than erroring — safer for being called early in
# PRINT_START before INITIALIZE_TOOLCHANGER finishes.

[gcode_macro _sa_status_apply]
# Internal: resolve active tool, apply nozzle state by name.
gcode:
    {% set state = params.STATE|string %}
    {% if 'TOOL' in params %}
        {% set t = params.TOOL|int %}
    {% else %}
        {% set t = printer.tool_probe_endstop.active_tool_number|default(-1)|int %}
    {% endif %}
    {% if t >= 0 %}
        _sa_set_nozzle_by_state TOOL={t} STATE={state}
    {% endif %}


[gcode_macro STATUS_READY]
description: Active tool's nozzle to bright white. Default state when nothing
  specific is happening (mounted but idle, or end of a phase).
gcode:
    _sa_status_apply STATE=ready {rawparams}


[gcode_macro STATUS_PRINTING]
description: Active tool's nozzle to bright white (same as ready).
gcode:
    _sa_status_apply STATE=printing {rawparams}


[gcode_macro STATUS_HEATING]
description: Active tool's nozzle to warm orange. Use during M104 / M109 / M190 waits.
gcode:
    _sa_status_apply STATE=heating {rawparams}


[gcode_macro STATUS_BUSY]
description: Active tool's nozzle to amber. Use during PAUSE / M600 waits.
gcode:
    _sa_status_apply STATE=busy {rawparams}


[gcode_macro STATUS_HOMING]
description: Active tool's nozzle to green. Use during G28.
gcode:
    _sa_status_apply STATE=homing {rawparams}


[gcode_macro STATUS_LEVELING]
description: Active tool's nozzle to purple. Use during QUAD_GANTRY_LEVEL / G32.
gcode:
    _sa_status_apply STATE=leveling {rawparams}


[gcode_macro STATUS_MESHING]
description: Active tool's nozzle to teal. Use during BED_MESH_CALIBRATE.
gcode:
    _sa_status_apply STATE=meshing {rawparams}


[gcode_macro STATUS_CLEANING]
description: Active tool's nozzle to cyan. Use during _CLEAN_NOZZLE / _WIPE_NOZZLE.
gcode:
    _sa_status_apply STATE=cleaning {rawparams}


[gcode_macro STATUS_CALIBRATING_Z]
description: Active tool's nozzle to magenta. Use during Z probe / tap.
gcode:
    _sa_status_apply STATE=calibrating_z {rawparams}


[gcode_macro STATUS_OFF]
description: Turn off the active tool's nozzle (or specific TOOL=N).
gcode:
    _sa_status_apply STATE=off {rawparams}


# ─────────────────────────────────────────────────────────────────
# State-driven auto-picker + bulk refresh
# ─────────────────────────────────────────────────────────────────

[gcode_macro _SA_LED_FROM_STATE]
description: Auto-pick ACTIVE / PARKED / UNLOADED for tool N from
  autoloader status and current toolchanger state. Prefer ACTIVE if
  the tool is currently mounted on the carriage; then PARKED with
  filament color if the path has one; else UNLOADED dim white.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% set active = printer.tool_probe_endstop.active_tool_number|default(-1)|int %}
    {% set hexes = printer["autoloader"].path_color_hexes|default([]) %}
    {% set hex_c = (hexes[t] if t < hexes|length else "")|string %}
    {% if t == active %}
        _SA_LED_ACTIVE TOOL={t}
    {% elif hex_c %}
        _SA_LED_PARKED TOOL={t}
    {% else %}
        _SA_LED_UNLOADED TOOL={t}
    {% endif %}


[gcode_macro _SA_LEDS_INIT_ALL]
description: Set every toolhead's LEDs based on autoloader state. The
  ACTIVE param explicitly names which tool is currently mounted on the
  carriage; if not supplied, falls back to tool_probe_endstop's
  detection. Active tool gets _SA_LED_ACTIVE, every other tool gets
  _SA_LED_FROM_STATE.
gcode:
    {% set num = printer["autoloader"].num_paths|default(6)|int %}
    {% if 'ACTIVE' in params %}
        {% set active = params.ACTIVE|int %}
    {% else %}
        {% set active = printer.tool_probe_endstop.active_tool_number|default(-1)|int %}
    {% endif %}
    {% for t in range(num) %}
        {% if t == active %}
            _SA_LED_ACTIVE TOOL={t}
        {% else %}
            _SA_LED_FROM_STATE TOOL={t}
        {% endif %}
    {% endfor %}


# ─────────────────────────────────────────────────────────────────
# Startup trigger
# ─────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────
# Diagnostic — index mapping test
# ─────────────────────────────────────────────────────────────────

[gcode_macro _SA_LED_TEST_CASELIGHT]
description: v5 — final tuning pass. Pulled LED 4 (Orange) deeper into
  the red-orange zone since it still showed a slight yellow lean in v4,
  and pulled LED 18 (Rose) warmer (less blue) so it visibly separates
  from LED 17 (Pink). Everything else is locked from v4 since it read
  correctly in the photo.
    INDEX  Expected            RGB (0-1)              Notes
      1    WHITE   [MARKER]    1.00 / 1.00 / 1.00     chain start
      2    Red                 0.40 / 0.00 / 0.00
      3    Vermilion           0.40 / 0.06 / 0.00
      4    Orange              0.40 / 0.10 / 0.00     [v4 G=0.15 -> 0.10]
      5    Yellow              0.38 / 0.40 / 0.00
      6    Lime                0.23 / 0.40 / 0.00
      7    Green               0.05 / 0.40 / 0.00
      8    Emerald             0.00 / 0.40 / 0.07
      9    Spring              0.00 / 0.35 / 0.25
     10    Turquoise           0.00 / 0.30 / 0.38
     11    Cyan                0.00 / 0.25 / 0.40
     12    Sky                 0.00 / 0.15 / 0.40
     13    Blue                0.00 / 0.00 / 0.40
     14    Indigo              0.09 / 0.00 / 0.40
     15    Violet              0.23 / 0.00 / 0.40
     16    Magenta             0.37 / 0.00 / 0.40
     17    Pink                0.40 / 0.00 / 0.29
     18    Rose                0.40 / 0.00 / 0.07     [v4 B=0.15 -> 0.07]
gcode:
    SET_LED LED=caselight INDEX=1  RED=1.00 GREEN=1.00 BLUE=1.00 TRANSMIT=0
    SET_LED LED=caselight INDEX=2  RED=0.40 GREEN=0.00 BLUE=0.00 TRANSMIT=0
    SET_LED LED=caselight INDEX=3  RED=0.40 GREEN=0.06 BLUE=0.00 TRANSMIT=0
    SET_LED LED=caselight INDEX=4  RED=0.40 GREEN=0.10 BLUE=0.00 TRANSMIT=0
    SET_LED LED=caselight INDEX=5  RED=0.38 GREEN=0.40 BLUE=0.00 TRANSMIT=0
    SET_LED LED=caselight INDEX=6  RED=0.23 GREEN=0.40 BLUE=0.00 TRANSMIT=0
    SET_LED LED=caselight INDEX=7  RED=0.05 GREEN=0.40 BLUE=0.00 TRANSMIT=0
    SET_LED LED=caselight INDEX=8  RED=0.00 GREEN=0.40 BLUE=0.07 TRANSMIT=0
