# Autoloader — User-tunable parameters
#
# All user-adjustable values for the autoloader live here. Hardware sections
# (MCU, drivers, sensors, servo, encoders) live in hardware.cfg. Pin aliases
# live in pin_aliases.cfg.
#
# This is a SINGLE [autoloader] section because Klipper does not
# allow a section to be split across multiple files. The hardware-reference
# keys at the top map abstract names to the [...] sections defined in
# hardware.cfg. Everything below is tunable.
#
# Calibrated values (selector_position_N, bowden_length_N, drive
# rotation_distance, encoder mm_per_pulse) are also persisted to
# variables.cfg by SA_CALIBRATE_* commands. The values here are SEEDS
# loaded at boot — variables.cfg overrides them when present.

[autoloader]

# ═══════════════════════════════════════════════════════════════════════════
# HARDWARE REFERENCES — must match section names defined in hardware.cfg
# ═══════════════════════════════════════════════════════════════════════════

drive_stepper    : manual_stepper sa_drive
selector_stepper : manual_stepper sa_selector
servo            : servo sa_engage

# Per-path encoders (one fixed encoder per filament path)
encoder_0 : sa_encoder 0
encoder_1 : sa_encoder 1
encoder_2 : sa_encoder 2
encoder_3 : sa_encoder 3
encoder_4 : sa_encoder 4
encoder_5 : sa_encoder 5

# Entry sensors — one per path, fixed at the roll end
entry_sensor_0 : filament_switch_sensor entry_sensor_0
entry_sensor_1 : filament_switch_sensor entry_sensor_1
entry_sensor_2 : filament_switch_sensor entry_sensor_2
entry_sensor_3 : filament_switch_sensor entry_sensor_3
entry_sensor_4 : filament_switch_sensor entry_sensor_4
entry_sensor_5 : filament_switch_sensor entry_sensor_5

# Toolhead sensors — between extruder gears and nozzle (BTT EBB36 PB8).
# Used as final load confirmation and as the start of the unload tip-form sequence.
toolhead_sensor_0 : filament_switch_sensor toolhead_sensor_0
toolhead_sensor_1 : filament_switch_sensor toolhead_sensor_1
toolhead_sensor_2 : filament_switch_sensor toolhead_sensor_2
toolhead_sensor_3 : filament_switch_sensor toolhead_sensor_3
toolhead_sensor_4 : filament_switch_sensor toolhead_sensor_4
toolhead_sensor_5 : filament_switch_sensor toolhead_sensor_5

# Extruder entry sensors — at the toolhead entry, before extruder gears (BTT EBB36 PB5).
# Used as the load target (preferred over tube_length) and for SA_CALIBRATE_BOWDEN.
extruder_sensor_0 : filament_switch_sensor extruder_sensor_0
extruder_sensor_1 : filament_switch_sensor extruder_sensor_1
extruder_sensor_2 : filament_switch_sensor extruder_sensor_2
extruder_sensor_3 : filament_switch_sensor extruder_sensor_3
extruder_sensor_4 : filament_switch_sensor extruder_sensor_4
extruder_sensor_5 : filament_switch_sensor extruder_sensor_5

# Extruder names for heating during load (must match toolchanger extruder names in printer.cfg)
extruder_0 : extruder
extruder_1 : extruder1
extruder_2 : extruder2
extruder_3 : extruder3
extruder_4 : extruder4
extruder_5 : extruder5

# ═══════════════════════════════════════════════════════════════════════════
# PATH SETUP
# ═══════════════════════════════════════════════════════════════════════════

# Number of active filament paths (1–32). Must match how many of the per-path
# blocks above (encoders, sensors, extruders) you populate.
num_paths : 6

# ═══════════════════════════════════════════════════════════════════════════
# SELECTOR POSITIONS (mm from home)
# Calibrated automatically by SA_CALIBRATE_SELECTOR (stallguard sweep).
# Default spacing if uncalibrated is N × 21.0 mm.
# These values are seed values — variables.cfg overrides at boot if present.
# ═══════════════════════════════════════════════════════════════════════════

selector_position_0 : 0.0
selector_position_1 : 24.49
selector_position_2 : 48.98
selector_position_3 : 73.48
selector_position_4 : 97.97
selector_position_5 : 122.46

# ═══════════════════════════════════════════════════════════════════════════
# BOWDEN LENGTHS (mm — drive gear encoder → extruder entry sensor)
# Calibrated by SA_CALIBRATE_BOWDEN TOOL=N (requires extruder_sensor_N wired).
# Used as the load target when the extruder sensor is configured; falls back
# to tube_length if not. These values are seeds — variables.cfg overrides.
# ═══════════════════════════════════════════════════════════════════════════

bowden_length_0 : 1455.34
bowden_length_1 : 1394.58
bowden_length_2 : 1460.79
bowden_length_3 : 1423.07
bowden_length_4 : 1372.44
bowden_length_5 : 1372.44

# ═══════════════════════════════════════════════════════════════════════════
# SERVO ANGLES
# Tune until the engaged angle gives firm filament grip with no slip and the
# disengaged angle fully releases the gear (path is neutral / free-flowing).
# ═══════════════════════════════════════════════════════════════════════════

servo_engaged_angle    : 160     # degrees — drive gear grips filament
servo_disengaged_angle : 10      # degrees — drive gear releases (neutral)

# ═══════════════════════════════════════════════════════════════════════════
# LOAD SEQUENCE TUNING
# ═══════════════════════════════════════════════════════════════════════════

tube_length         : 800        # mm — legacy fallback Bowden length used only if bowden_length_N not set
nozzle_distance     : 50         # mm — extruder gears → nozzle tip; extruder pushes filament this far after gears
purge_length        : 30         # mm — extra extrusion after nozzle is reached (clears air, primes nozzle)
load_temperature    : 200        # °C — minimum hotend temperature before any extrusion is attempted
engage_max_distance : 60         # mm — max drive travel before encoder must register motion (jam detection)
fill_nozzle_length  : 50         # mm — extra fill after toolhead sensor triggers, to fully prime hotend
max_volumetric_flow : 10.0        # mm³/s — caps purge/fill speed so it never exceeds the hotend's melt rate

# ═══════════════════════════════════════════════════════════════════════════
# UNLOAD / TIP-FORM SEQUENCE (runs when toolhead sensor is active = filament at nozzle)
#
# 3-phase retract sequence:
#   Phase 1 (fast)      : nozzle → start of heatbreak — clears the melt zone
#   Phase 2 (heatbreak) : through heatbreak with optional dwell at midpoint to set the tip
#   Phase 3 (slow)      : heatbreak exit through extruder gears, to nozzle_to_sensor_dist × 1.05
# ═══════════════════════════════════════════════════════════════════════════

tip_form_temp            : 185   # °C — tip-form temperature; heater is brought here before retracting
tip_form_push_length     : 8.0   # mm — initial down-push to form the tip mass
tip_form_push_speed      : 25.0  # mm/s — push speed
tip_form_heatbreak_dist  : 40.0  # mm — heatbreak zone length (Phase 2 distance)
tip_form_heatbreak_speed : 10.0  # mm/s — retract speed through the heatbreak
tip_form_retract_speed   : 70.0  # mm/s — fast retract from nozzle to heatbreak (Phase 1)
tip_form_slow_speed      : 7.5  # mm/s — slow retract through the gears (Phase 3)
tip_form_dwell           : 5   # seconds — hold time at heatbreak midpoint; 0 disables
nozzle_to_sensor_dist    : 50.0  # mm — nozzle → extruder sensor; total Phase-3 target = this × 1.05

# Bowden-phase retract (after gears clear, or when only entry+extruder sensors are active)
wiggle_distance          : 5.0   # mm — forward+back wiggle to verify drive grip before retracting
sensor_retry_dist        : 20.0  # mm — inch-back distance after a sensor read misses
encoder_to_gear_distance : 20.0  # mm — encoder → drive gear; how far past entry sensor to keep retracting

# ═══════════════════════════════════════════════════════════════════════════
# PARKING SEQUENCE
#
# Two paths share this routine. Both end with the filament tip at park_offset
# mm before the encoder, drive gear engaged. Values are listed in the order
# each step executes. Keep chunk sizes > mm_per_pulse (~1.9 on this hardware)
# so each chunk reliably triggers ≥1 encoder pulse.
#
# LOAD path   — called on fresh insert at entry sensor and during load Branch C.
#               Executes Steps 1–6.
# UNLOAD path — called by do_unload after the long Bowden blast retract.
#               Executes Phases 1–3.
# ═══════════════════════════════════════════════════════════════════════════

# ── Common (used by Step 6 of LOAD and Phase 3 of UNLOAD) ───────────────────
park_offset                 : 5.0    # mm — final position of filament tip BEFORE the encoder.
                                       # Increase if you want the tip parked further back from the
                                       # encoder; decrease for closer.
park_offset_speed           : 5.0   # mm/s — speed of the final retract that lands at park_offset.

# ── LOAD path ──────────────────────────────────────────────────────────────
# Step 1 — initial feed forward to engage drive gear and push past encoder.
#          Total feed distance = encoder_to_gear_distance + park_load_initial_extra.
park_load_initial_extra     : 10   # mm — extra travel beyond encoder_to_gear_distance.
                                       # Higher = more margin if drive gear is slow to grip.
park_load_initial_speed     : 20   # mm/s — feed speed for the initial push.

# Step 2 — retract until encoder is quiet (wheel stopped rotating = filament cleared).
park_load_retract_chunk     : 5.0    # mm per loop iteration — small enough to stop promptly
                                       # after the trailing edge passes the encoder.
park_load_retract_speed     : 10   # mm/s
park_load_retract_pause     : 0.15   # seconds — settling time before reading encoder
park_load_retract_max       : 50  # mm — safety ceiling; loop ends without break if hit.

# Steps 3 + 5 — Pass 1 and Pass 2: feed forward until the encoder picks up.
#               Both passes use these same values. Distance accumulates across
#               iterations (no per-chunk reset) so cumulative motion still
#               trips the threshold even if individual chunks are sub-pulse.
park_load_find_chunk        : 5.0    # mm per loop iteration — must be > mm_per_pulse for
                                       # reliable detection. 5mm at mpp≈1.88 = ~2.6 pulses/chunk.
park_load_find_speed        : 5.0   # mm/s — slow so we don't overshoot the encoder edge.
park_load_find_pause        : 0.10   # seconds
park_load_find_max          : 50  # mm — search ceiling per pass; logs WARNING if exhausted
                                       # (Step 6 still runs — filament is never left unparked).

# Step 4 — back off so Pass 2 (Step 5) has room to re-detect the encoder edge.
park_load_backoff_extra     : 6.0    # mm — added to park_offset for the back-off retract.
                                       # Total back-off = park_offset + this (= 11mm default).

# Step 6 — final retract by park_offset. Uses park_offset and park_offset_speed (above).

# ── UNLOAD path ────────────────────────────────────────────────────────────
# Phase 1 — retract in chunks while encoder shows motion (debounced).
park_unload_chunk           : 10.0   # mm per loop iteration — bigger than load to speed
                                       # up long retracts after the Bowden blast.
park_unload_speed           : 25.0   # mm/s
park_unload_pause           : 0.20   # seconds
park_unload_quiet_iters     : 2      # consecutive sub-pulse chunks required to confirm
                                       # filament has cleared encoder. 1 = no debounce
                                       # (will exit on a single missed pulse). 3+ = more
                                       # tolerant of intermittent contact, slower to exit.
park_unload_max             : 800.0  # mm — safety ceiling

# Phase 2 — feed forward in small steps to re-find the tip.
park_unload_find_chunk      : 2.0    # mm per step — small to land just at the encoder edge.
park_unload_find_speed      : 15.0   # mm/s
park_unload_find_pause      : 0.10   # seconds
park_unload_find_max        : 120.0  # mm — search ceiling; logs WARNING if exhausted but
                                       # Phase 3 still runs.

# Phase 3 — final retract by park_offset. Uses park_offset and park_offset_speed (above).

# ═══════════════════════════════════════════════════════════════════════════
# PARK / CLEAN POSITIONS
# ═══════════════════════════════════════════════════════════════════════════

load_park_x          : 175.0     # mm — X position when parking (idle/no-print)
load_park_y          : 10.0      # mm — Y position when parking
load_park_z          : 50.0      # mm — Z held throughout load/unload + park
load_print_park_x    : 10.0      # mm — X parking position during an active print (avoid the part)
load_print_park_y    : 10.0      # mm — Y parking position during an active print
cooling_pad_enabled  : True      # call PARK_ON_COOLING_PAD after every load/unload
clean_nozzle_enabled : True      # call SA_CLEAN_NOZZLE before parking — disable if no brush

# ═══════════════════════════════════════════════════════════════════════════
# MOTION SPEEDS
# ═══════════════════════════════════════════════════════════════════════════

feed_speed     : 50              # mm/s — drive motor speed during Bowden feed/retract
selector_speed : 200             # mm/s — selector motor speed (carriage moves)
feed_step_size : 10              # mm — drive motor step per loop iteration

# ═══════════════════════════════════════════════════════════════════════════
# SAFETY / MONITORING
# ═══════════════════════════════════════════════════════════════════════════

slip_tolerance       : 15        # % — warn if encoder vs stepper distance differs by more than this
sensor_polling_delay : 0.2       # seconds between sensor checks inside feed loops
servo_move_delay     : 0.3       # seconds to wait after a servo position command
stepper_timeout      : 120       # seconds before an idle stepper auto-disables (0 = never)

# ═══════════════════════════════════════════════════════════════════════════
# SELECTOR HOMING (SA_HOME — uses physical endstop SA_SELECTOR_STOP)
# ═══════════════════════════════════════════════════════════════════════════

selector_max_travel     : 200.0  # mm — max travel during fast homing approach
selector_homing_speed   : 50.0   # mm/s — fast approach speed
selector_homing_backoff : 5.0    # mm — back-off distance before slow re-approach (double-touch home)

# ═══════════════════════════════════════════════════════════════════════════
# SELECTOR STALLGUARD CALIBRATION (SA_CALIBRATE_SELECTOR — one-time setup)
# These drive a one-time stallguard sweep to measure the rail length and
# auto-derive selector_position_N. Bumping the hard stop at this current is
# harmless. Tune only if SA_CALIBRATE_SELECTOR misbehaves.
# ═══════════════════════════════════════════════════════════════════════════

# selector_stall_current   : 0.3   # A — reduced motor current during stallguard sweep
# selector_stall_threshold : 1     # SGT value (-64 most sensitive → 63 least); raise to reduce false stalls
# selector_stall_speed     : 30.0  # mm/s sweep speed; too slow = unreliable, too fast = overrun
