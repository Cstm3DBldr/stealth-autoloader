# Autoloader macros.cfg
#
# Thin user-facing wrappers around Python backend commands.
# All logic lives in autoloader.py — do not add sequences here.
#
# Python backend registers these commands directly:
#   SA_HOME, SA_SELECT, SA_ENGAGE, SA_DISENGAGE
#   SA_LOAD, SA_UNLOAD, SA_STATUS
#   SA_BUZZ_DRIVE, SA_BUZZ_SELECTOR
#   SA_CALIBRATE_ENCODER, SA_CALIBRATE_SELECTOR, SA_SET_SELECTOR_HOME
#   SA_SET_STATE

# ---------------------------------------------------------------------------
# Convenience wrappers — call the active toolhead's path by toolchanger index
# ---------------------------------------------------------------------------

[gcode_macro FILAMENT_LOAD]
description: Load filament on the currently active toolhead
gcode:
    {% set tool = printer.toolchanger.tool_number | default(0) | int %}
    SA_LOAD TOOL={tool}

[gcode_macro FILAMENT_UNLOAD]
description: Unload filament on the currently active toolhead
gcode:
    {% set tool = printer.toolchanger.tool_number | default(0) | int %}
    SA_UNLOAD TOOL={tool}

# ---------------------------------------------------------------------------
# Per-path direct load / unload shortcuts
# ---------------------------------------------------------------------------

[gcode_macro FILAMENT_LOAD_0]
description: Load filament path 0
gcode: SA_LOAD TOOL=0

[gcode_macro FILAMENT_LOAD_1]
description: Load filament path 1
gcode: SA_LOAD TOOL=1

[gcode_macro FILAMENT_LOAD_2]
description: Load filament path 2
gcode: SA_LOAD TOOL=2

[gcode_macro FILAMENT_LOAD_3]
description: Load filament path 3
gcode: SA_LOAD TOOL=3

[gcode_macro FILAMENT_LOAD_4]
description: Load filament path 4
gcode: SA_LOAD TOOL=4

[gcode_macro FILAMENT_LOAD_5]
description: Load filament path 5
gcode: SA_LOAD TOOL=5

[gcode_macro FILAMENT_UNLOAD_0]
description: Unload filament path 0
gcode: SA_UNLOAD TOOL=0

[gcode_macro FILAMENT_UNLOAD_1]
description: Unload filament path 1
gcode: SA_UNLOAD TOOL=1

[gcode_macro FILAMENT_UNLOAD_2]
description: Unload filament path 2
gcode: SA_UNLOAD TOOL=2

[gcode_macro FILAMENT_UNLOAD_3]
description: Unload filament path 3
gcode: SA_UNLOAD TOOL=3

[gcode_macro FILAMENT_UNLOAD_4]
description: Unload filament path 4
gcode: SA_UNLOAD TOOL=4

[gcode_macro FILAMENT_UNLOAD_5]
description: Unload filament path 5
gcode: SA_UNLOAD TOOL=5

# ---------------------------------------------------------------------------
# Nozzle wipe — called automatically before parking after load/unload
# (clean_nozzle_enabled: True in hardware.cfg)
#
# Customize X/Y for your brush/pad position.
# DO NOT add Z moves here — the autoloader holds Z at load_park_z throughout.
# The nozzle is still hot from load/unload when this runs, so no pre-heat needed.
# Disable by setting clean_nozzle_enabled: False in hardware.cfg.
# ---------------------------------------------------------------------------

[gcode_macro SA_CLEAN_NOZZLE]
description: Oscillating nozzle wipe — 6 passes at X40, 7 passes at X70, Y shifts each stroke.
gcode:
    G90
    G0 X80 Y350 F5000   ; approach brush
    G0 X40 F5000        ; x40 pass 1  (Y350)
    G0 X70 F5000        ; x70 pass 1  (Y350 — same row, no Y shift)
    G0 Y349 F5000
    G0 X40 F5000        ; x40 pass 2
    G0 Y348 F5000
    G0 X70 F5000        ; x70 pass 2
    G0 Y350 F5000
    G0 X40 F5000        ; x40 pass 3
    G0 Y349 F5000
    G0 X70 F5000        ; x70 pass 3
    G0 Y348 F5000
    G0 X40 F5000        ; x40 pass 4
    G0 Y350 F5000
    G0 X70 F5000        ; x70 pass 4
    G0 Y349 F5000
    G0 X40 F5000        ; x40 pass 5
    G0 Y348 F5000
    G0 X70 F5000        ; x70 pass 5
    G0 Y350 F5000
    G0 X40 F5000        ; x40 pass 6 (last X40)
    G0 Y349 F5000
    G0 X70 F5000        ; x70 pass 6
    G0 Y348 F5000
    G0 X70 F5000        ; x70 pass 7 (final)
    G0 X30 Y300 F5000   ; clear brush area

# ---------------------------------------------------------------------------
# Manual unload backup — use when autoloader is disabled or for manual swaps
# Parameters: TEMP (default 185°C), LENGTH (default 120mm)
# ---------------------------------------------------------------------------

[gcode_macro UNLOAD_FILAMENT_MANUAL]
description: Manual tip-form + retract unload for active extruder (autoloader bypass)
gcode:
    {% set temp   = params.TEMP   | default(185) | float %}
    {% set length = params.LENGTH | default(120)  | float %}
    M117 Cooling to {temp|int}C for tip forming...
    M104 S{temp}
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={temp + 5}
    M117 Tip forming...
    M83
    G1 E8 F1200
    G1 E-{length} F6000
    M400
    M104 S0
    M117 Unload complete


# ─────────────────────────────────────────────────────────────────
# Status-LED wrappers for built-in commands (G28, BED_MESH_CALIBRATE)
# ─────────────────────────────────────────────────────────────────
# PRINT_START / QUAD_GANTRY_LEVEL / _CLEAN_NOZZLE / PAUSE / RESUME /
# PRINT_END / CANCEL_PRINT in the user's `~/printer_data/config/macros.cfg`
# already fire the right STATUS_* macros at the right time. The two
# remaining gaps are STANDALONE invocations of:
#
#   - G28 (homing called from console, KlipperScreen home button,
#     Mainsail's home buttons, etc. — anywhere outside PRINT_START)
#   - BED_MESH_CALIBRATE (manual mesh recalibration)
#
# These are wrapped here in the autoloader's own macros.cfg using
# Klipper's `rename_existing:` pattern so we don't have to edit the
# user's macros.cfg (which lives outside ~/autoloader/ and is NOT
# synced by post_update.sh — modifying it would require manual
# reapplication after any printer-side reset).
#
# The pattern: our [gcode_macro G28] takes over the name `G28`. The
# original Klipper-builtin G28 gets renamed to `G28.1` and runs as the
# "real" homing under our wrapper. PRINT_START still calls G28 → our
# wrapper → STATUS_HOMING → G28.1 → done. Outside PRINT_START, calling
# G28 also fires STATUS_HOMING for visibility.
#
# We deliberately do NOT call STATUS_READY at the end of the wrapper.
# Inside PRINT_START the next phase sets its own status (STATUS_HEATING
# / STATUS_PRINTING). Standalone the green is left lit as a "homing
# complete" persistent marker until the user runs another command —
# more useful than a brief flash. The sa_led_animator's temp-aware
# parked_cold/heating override only kicks in when its cache says
# "should be different from what's there", so a green left over from
# a manual G28 keeps showing until the user fires another STATUS_*
# or until temperature crosses the heater_fan threshold (which forces
# a re-emit). That tradeoff is acceptable for a manual-only path.
#
# Same reasoning applies to BED_MESH_CALIBRATE — show STATUS_MESHING
# during mesh, leave teal as "mesh complete" indicator for standalone
# use.
#
# IMPORTANT: `{rawparams}` MUST be passed through so axis-restricted
# forms still work — `G28 X`, `G28 Y`, `G28 Z`, etc.

[gcode_macro G28]
description: Wrapped G28 — fires STATUS_HOMING (active tool's nozzle
  to green) then runs the real homing. Does not reset status at end;
  caller (PRINT_START etc.) sets next phase, or animator's temp-aware
  override eventually takes over via temperature change.
rename_existing: G28.1
gcode:
    STATUS_HOMING
    G28.1 {rawparams}


[gcode_macro BED_MESH_CALIBRATE]
description: Wrapped BED_MESH_CALIBRATE — fires STATUS_MESHING (active
  tool's nozzle to teal) then runs the real bed-mesh probing. PRINT_START
  uses BED_MESH_PROFILE LOAD instead of CALIBRATE, so this wrapper only
  fires on standalone manual mesh recalibration.
rename_existing: BED_MESH_CALIBRATE.1
gcode:
    STATUS_MESHING
    BED_MESH_CALIBRATE.1 {rawparams}
