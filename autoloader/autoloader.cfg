# Autoloader main entry point — included from printer.cfg via:
#   [include autoloader/autoloader.cfg]
#
# autoloader MCU (BTT MMB CAN V2.0): UUID 329ce333239a — ACTIVE
# All 6 filament paths on one board.
#
# File roles:
#   pin_aliases.cfg   — physical hardware pins → human-readable aliases (only)
#   hardware.cfg      — MCU, drivers, steppers, servo, encoders, sensors (only)
#   parameters.cfg    — [autoloader] section: all user-tunable values
#   macros.cfg        — gcode_macro wrappers around the Python backend

[include pin_aliases.cfg]
[include hardware.cfg]
[include parameters.cfg]
[include macros.cfg]

# Dynamic calibration values — written immediately by SA_CALIBRATE_*, no restart needed.
# Keys: selector_position_N, bowden_length_N, encoder_mpp_N, drive_rotation_distance
[save_variables]
filename: ~/printer_data/config/autoloader/variables.cfg
