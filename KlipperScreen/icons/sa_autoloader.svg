<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Filament spool body -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#90CAF9" stroke-width="6"/>
  <!-- Spool hub -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="#90CAF9" stroke-width="4"/>
  <!-- Selector rail (horizontal) -->
  <rect x="10" y="46" width="80" height="8" rx="4" fill="#64B5F6"/>
  <!-- Drive gear indicator -->
  <circle cx="50" cy="50" r="6" fill="#42A5F5"/>
  <!-- Filament path lines -->
  <line x1="20" y1="50" x2="20" y2="20" stroke="#B3E5FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="35" y1="50" x2="35" y2="20" stroke="#B3E5FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="20" stroke="#B3E5FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="65" y1="50" x2="65" y2="20" stroke="#B3E5FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="50" x2="80" y2="20" stroke="#B3E5FC" stroke-width="2.5" stroke-linecap="round"/>
</svg>
