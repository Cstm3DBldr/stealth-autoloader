# sa_klipperscreen.conf — Autoloader menu registration for KlipperScreen
#
# Copy contents into ~/printer_data/config/KlipperScreen.conf
# (KlipperScreen does not support [include] natively)

[menu __main autoloader]
name: Autoloader
icon: spoolman

[menu __main autoloader status]
name: Status
panel: sa_main
icon: spoolman

[menu __main autoloader load_unload]
name: Load / Unload
panel: sa_load_unload
icon: load

[menu __main autoloader macros]
name: Macros
panel: sa_macros
icon: settings

[menu __main autoloader calibration]
name: Calibration
panel: sa_calibration_guide
icon: settings

[menu __main autoloader settings]
name: Settings
panel: sa_settings
icon: settings


[menu __print autoloader]
name: Autoloader
icon: spoolman

[menu __print autoloader status]
name: Status
panel: sa_main
icon: spoolman

[menu __print autoloader load_unload]
name: Load / Unload
panel: sa_load_unload
icon: load
