# Pin Aliases - edit your real pins here (one place only)

[board_pins stealth_autoloader]
mcu: mcu
aliases:
    # Tool 0 Feed Motor
    FEED_MOTOR_STEP_T0=^your_step_pin_t0,
    FEED_MOTOR_DIR_T0=^your_dir_pin_t0,
    FEED_MOTOR_ENABLE_T0=!your_enable_pin_t0,

    # Tool 0 Sensors
    ENTRY_SENSOR_T0=^your_entry_pin_t0,
    EXTRUDER_SENSOR_T0=^your_extruder_sensor_pin_t0,
    TOOLHEAD_SENSOR_T0=^your_toolhead_sensor_pin_t0,
    BUFFER_TENSION_T0=^your_tension_pin_t0,
    BUFFER_COMPRESSION_T0=^your_compression_pin_t0,

    # Add Tool 1-5 later by copying the blocks above and changing _T0 to _T1 etc.
