# Pin Aliases — enter ONLY real pin numbers here. One place only.
#
# Rules:
#   - One [board_pins] block per MCU. The block name MUST exactly match the [mcu name].
#   - No polarity (^ or !) in alias values — add polarity in hardware.cfg on the line that uses the pin.
#   - Last alias in each block has NO trailing comma. Every other line has a comma.
#
# autoloader_a handles Tools 0, 1, 2
# autoloader_b handles Tools 3, 4, 5

[board_pins autoloader_a]
mcu: autoloader_a
aliases:
    # Tool 0 — Feed Motor
    SA_FEED_STEP_T0=PA0,
    SA_FEED_DIR_T0=PA1,
    SA_FEED_EN_T0=PA2,
    # Tool 0 — Sensors
    SA_ENTRY_T0=PB0,
    SA_EXTRUDER_T0=PB1,
    SA_TOOLHEAD_T0=PB2,
    SA_TENSION_T0=PB3,
    SA_COMPRESSION_T0=PB4,

    # Tool 1 — Feed Motor
    SA_FEED_STEP_T1=PA3,
    SA_FEED_DIR_T1=PA4,
    SA_FEED_EN_T1=PA5,
    # Tool 1 — Sensors
    SA_ENTRY_T1=PB5,
    SA_EXTRUDER_T1=PB6,
    SA_TOOLHEAD_T1=PB7,
    SA_TENSION_T1=PB8,
    SA_COMPRESSION_T1=PB9,

    # Tool 2 — Feed Motor
    SA_FEED_STEP_T2=PA6,
    SA_FEED_DIR_T2=PA7,
    SA_FEED_EN_T2=PA8,
    # Tool 2 — Sensors
    SA_ENTRY_T2=PC0,
    SA_EXTRUDER_T2=PC1,
    SA_TOOLHEAD_T2=PC2,
    SA_TENSION_T2=PC3,
    SA_COMPRESSION_T2=PC4

[board_pins autoloader_b]
mcu: autoloader_b
aliases:
    # Tool 3 — Feed Motor
    SA_FEED_STEP_T3=PA0,
    SA_FEED_DIR_T3=PA1,
    SA_FEED_EN_T3=PA2,
    # Tool 3 — Sensors
    SA_ENTRY_T3=PB0,
    SA_EXTRUDER_T3=PB1,
    SA_TOOLHEAD_T3=PB2,
    SA_TENSION_T3=PB3,
    SA_COMPRESSION_T3=PB4,

    # Tool 4 — Feed Motor
    SA_FEED_STEP_T4=PA3,
    SA_FEED_DIR_T4=PA4,
    SA_FEED_EN_T4=PA5,
    # Tool 4 — Sensors
    SA_ENTRY_T4=PB5,
    SA_EXTRUDER_T4=PB6,
    SA_TOOLHEAD_T4=PB7,
    SA_TENSION_T4=PB8,
    SA_COMPRESSION_T4=PB9,

    # Tool 5 — Feed Motor
    SA_FEED_STEP_T5=PA6,
    SA_FEED_DIR_T5=PA7,
    SA_FEED_EN_T5=PA8,
    # Tool 5 — Sensors
    SA_ENTRY_T5=PC0,
    SA_EXTRUDER_T5=PC1,
    SA_TOOLHEAD_T5=PC2,
    SA_TENSION_T5=PC3,
    SA_COMPRESSION_T5=PC4
