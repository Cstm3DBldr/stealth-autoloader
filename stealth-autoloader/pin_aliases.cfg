# Pin Aliases — BTT MMB CAN V2.0
#
# Rules:
#   - One [board_pins] block per MCU. Block name MUST match the [mcu name] exactly.
#   - No polarity (^ or !) in alias values — add polarity in hardware.cfg.
#   - Last alias in the block has NO trailing comma.
#
# Board: BTT MMB CAN V2.0 (STM32G0B1)
# MCU name: autoloader  (handles all 6 paths on one board)
#
# Motion topology:
#   Drive motor   — M1 (PD4/PD3/PD5/PB5)   moves filament when servo engaged
#   Selector motor— M2 (PC9/PC8/PD2/PB4)   positions drive gear to active path
#   M3, M4        — reserved for future use
#   Servo         — PA10 (STOP2)            engages/disengages drive gear (neutral/driven)
#   Selector home — PA15 (STOP1)            endstop for selector homing
#   Encoders      — PC7,PA9,PB12,PB10,PB1,PC5 (2x7 high pins, paths 0-5, fixed in path)
#   Entry sensors — PC6,PA8,PB11,PB2,PB0,PC4  (2x7 low  pins, paths 0-5, fixed in path)

[board_pins autoloader]
mcu: autoloader
aliases:
    # ── Drive motor (M1 — PD4/PD3/PD5/PB5) ──────────────────────────────
    SA_DRIVE_STEP=PD4,
    SA_DRIVE_DIR=PD3,
    SA_DRIVE_EN=PD5,
    SA_DRIVE_UART=PB5,

    # ── Selector motor (M2 — PC9/PC8/PD2/PB4) ───────────────────────────
    SA_SELECTOR_STEP=PC9,
    SA_SELECTOR_DIR=PC8,
    SA_SELECTOR_EN=PD2,
    SA_SELECTOR_UART=PB4,

    # ── Selector endstop (STOP1 = PA15) ─────────────────────────────────
    SA_SELECTOR_STOP=PA15,

    # ── Engage servo (STOP2 = PA10, PWM-capable) ─────────────────────────
    SA_SERVO=PA10,

    # ── Per-path encoders — one fixed encoder per filament path ──────────
    # Encoders sit permanently in each path (2x7 header high pins).
    # They never move. The selector moves only the drive gear carriage.
    SA_ENCODER_0=PC7,
    SA_ENCODER_1=PA9,
    SA_ENCODER_2=PB12,
    SA_ENCODER_3=PB10,
    SA_ENCODER_4=PB1,
    SA_ENCODER_5=PC5,

    # ── Entry sensors — one per filament path (2x7 header low pins) ──────
    SA_ENTRY_0=PC6,
    SA_ENTRY_1=PA8,
    SA_ENTRY_2=PB11,
    SA_ENTRY_3=PB2,
    SA_ENTRY_4=PB0,
    SA_ENTRY_5=PC4
