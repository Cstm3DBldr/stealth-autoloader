# Pin Aliases — BTT MMB CAN V2.0
#
# Rules:
#   - One [board_pins] block per MCU. Block name MUST match the [mcu name] exactly.
#   - No polarity (^ or !) in alias values — add polarity in hardware.cfg.
#   - Last alias in the block has NO trailing comma.
#
# Board: BTT MMB CAN V2.0 (STM32G0B1)
# MCU name: autoloader  (handles all 6 paths on one board)
# Drivers: BTT EZ5160 Pro (TMC5160) — software SPI on spi2 bus
#
# Physical driver slot assignments:
#   Selector motor — M1 slot (PD4/PD3/PD5, CS=PB5)
#   Drive motor    — M3 slot (PC15/PC11/PC10, CS=PB3)
#   M2, M4         — unused
#
# Motion topology:
#   Drive motor   — M3 (PC15/PC11/PC10, CS=PB3) moves filament when servo engaged
#   Selector motor— M1 (PD4/PD3/PD5,   CS=PB5) positions drive gear to active path
#   SPI bus       — spi2: MISO=PB14, MOSI=PB15, SCK=PB13 (shared by all drivers)
#   Servo         — PA1                          engages/disengages drive gear (neutral/driven)
#   Selector home — PA15 (STOP1)                endstop for selector homing
#   Encoders      — PC7,PA9,PB12,PB10,PB1,PC5   (2x7 header high pins, paths 0-5)
#   Entry sensors — PC6,PA8,PB11,PB2,PB0,PC4    (2x7 header low  pins, paths 0-5)

[board_pins autoloader]
mcu: autoloader
aliases:
    # ── Drive motor (M3 — PC15/PC11/PC10, SPI CS=PB3) ────────────────────
    SA_DRIVE_STEP=PC15,
    SA_DRIVE_DIR=PC11,
    SA_DRIVE_EN=PC10,
    SA_DRIVE_CS=PB3,

    # ── Selector motor (M1 — PD4/PD3/PD5, SPI CS=PB5) ───────────────────
    SA_SELECTOR_STEP=PD4,
    SA_SELECTOR_DIR=PD3,
    SA_SELECTOR_EN=PD5,
    SA_SELECTOR_CS=PB5,

    # ── Selector endstop (STOP1 = PA15) ─────────────────────────────────
    SA_SELECTOR_STOP=PA15,

    # ── Engage servo (PA1, PWM-capable) ──────────────────────────────────
    SA_SERVO=PA1,

    # ── Per-path encoders — one fixed encoder per filament path ──────────
    # Encoders sit permanently in each path (2x7 header high pins).
    # They never move. The selector moves only the drive gear carriage.
    SA_ENCODER_0=PC7,
    SA_ENCODER_1=PA9,
    SA_ENCODER_2=PB12,
    SA_ENCODER_3=PB10,
    SA_ENCODER_4=PB1,
    SA_ENCODER_5=PC5,

    # ── Entry sensors — one per filament path (2x7 header low pins) ──────
    SA_ENTRY_0=PC6,
    SA_ENTRY_1=PA8,
    SA_ENTRY_2=PB11,
    SA_ENTRY_3=PB2,
    SA_ENTRY_4=PB0,
    SA_ENTRY_5=PC4,

    # ── TMC5160 DIAG pins — stallguard output, wired directly to MCU ────────
    # BTT MMB CAN V2.0: M1=PB9, M2=PB8, M3=PB7, M4=PB6 (PCB trace, no header needed)
    # DIAG is open-drain, pulled up, goes LOW on stall.
    # ^! = pull-up + invert → PRESSED in Klipper when motor stalls.
    SA_SELECTOR_DIAG=PB9,
    SA_DRIVE_DIAG=PB7
