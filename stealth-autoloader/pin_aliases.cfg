# Pin Aliases — BTT MMB CAN V2.0
#
# Rules:
#   - One [board_pins] block per MCU. Block name MUST exactly match the [mcu name].
#   - No polarity (^ or !) in alias values — add polarity in hardware.cfg on the line that uses the pin.
#   - Last alias in each block has NO trailing comma.
#
# Both boards are identical hardware (BTT MMB CAN V2.0).
# autoloader_a handles Tools 0, 1, 2
# autoloader_b handles Tools 3, 4, 5 (second board — pending arrival)
#
# BTT MMB CAN V2.0 pin reference:
#   Steppers : M1=PD4/PD3/PD5/PB5  M2=PC9/PC8/PD2/PB4  M3=PC15/PC11/PC10/PB3  M4=PC13/PC12/PC14/PD6
#   2x7 low  : PC6  PA8  PB11 PB2  PB0  PC4
#   2x7 high : PC7  PA9  PB12 PB10 PB1  PC5
#
# 2x7 header wiring (entry sensor on low pin, encoder on high pin per tool):
#   T0: entry=PC6  encoder=PC7
#   T1: entry=PA8  encoder=PA9
#   T2: entry=PB11 encoder=PB12
#   T3: entry=PB2  encoder=PB10
#   T4: entry=PB0  encoder=PB1
#   T5: entry=PC4  encoder=PC5

[board_pins autoloader_a]
mcu: autoloader_a
aliases:
    # --- Tool 0 feed motor (M1) ---
    SA_FEED_STEP_T0=PD4,
    SA_FEED_DIR_T0=PD3,
    SA_FEED_EN_T0=PD5,
    SA_FEED_UART_T0=PB5,

    # --- Tool 1 feed motor (M2) ---
    SA_FEED_STEP_T1=PC9,
    SA_FEED_DIR_T1=PC8,
    SA_FEED_EN_T1=PD2,
    SA_FEED_UART_T1=PB4,

    # --- Tool 2 feed motor (M3) ---
    SA_FEED_STEP_T2=PC15,
    SA_FEED_DIR_T2=PC11,
    SA_FEED_EN_T2=PC10,
    SA_FEED_UART_T2=PB3,

    # --- Tool 0 sensors (2x7 header col 0) ---
    SA_ENTRY_T0=PC6,
    SA_ENCODER_T0=PC7,

    # --- Tool 1 sensors (2x7 header col 1) ---
    SA_ENTRY_T1=PA8,
    SA_ENCODER_T1=PA9,

    # --- Tool 2 sensors (2x7 header col 2) ---
    SA_ENTRY_T2=PB11,
    SA_ENCODER_T2=PB12

