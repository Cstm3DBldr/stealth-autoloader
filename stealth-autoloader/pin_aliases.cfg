# Pin Aliases — BTT MMB CAN V2.0
#
# Rules:
#   - One [board_pins] block per MCU. Block name MUST exactly match the [mcu name].
#   - No polarity (^ or !) in alias values — add polarity in hardware.cfg on the line that uses the pin.
#   - Last alias in each block has NO trailing comma.
#
# Both boards are identical hardware (BTT MMB CAN V2.0).
# autoloader_a handles Tools 0, 1, 2
# autoloader_b handles Tools 3, 4, 5
#
# BTT MMB CAN V2.0 pin reference:
#   Steppers : M1=PD4/PD3/PD5  M2=PC9/PC8/PD2  M3=PC15/PC11/PC10  M4=PC13/PC12/PC14
#   STOP1-4  : PA15 PA10 PD9 PD8
#   2x7 high : PC7  PA9  PB12 PB10 PB1  PC5
#   2x7 low  : PC6  PA8  PB11 PB2  PB0  PC4

[board_pins autoloader_a]
mcu: autoloader_a
aliases:
    # --- Tool 0 feed motor (M1) ---
    SA_FEED_STEP_T0=PD4,
    SA_FEED_DIR_T0=PD3,
    SA_FEED_EN_T0=PD5,
    SA_FEED_UART_T0=PB5,

    # --- Tool 1 feed motor (M2) ---
    SA_FEED_STEP_T1=PC9,
    SA_FEED_DIR_T1=PC8,
    SA_FEED_EN_T1=PD2,
    SA_FEED_UART_T1=PB4,

    # --- Tool 2 feed motor (M3) ---
    SA_FEED_STEP_T2=PC15,
    SA_FEED_DIR_T2=PC11,
    SA_FEED_EN_T2=PC10,
    SA_FEED_UART_T2=PB3,

    # --- Tool 0 sensors (STOP1-4 + 2x7 header) ---
    SA_ENTRY_T0=PA15,
    SA_EXTRUDER_T0=PA10,
    SA_TOOLHEAD_T0=PD9,
    SA_TENSION_T0=PD8,
    SA_COMPRESSION_T0=PC7,

    # --- Tool 1 sensors ---
    SA_ENTRY_T1=PA9,
    SA_EXTRUDER_T1=PB12,
    SA_TOOLHEAD_T1=PB10,
    SA_TENSION_T1=PB1,
    SA_COMPRESSION_T1=PC5,

    # --- Tool 2 sensors ---
    SA_ENTRY_T2=PC6,
    SA_EXTRUDER_T2=PA8,
    SA_TOOLHEAD_T2=PB11,
    SA_TENSION_T2=PB2,
    SA_COMPRESSION_T2=PB0

[board_pins autoloader_b]
mcu: autoloader_b
aliases:
    # --- Tool 3 feed motor (M1) ---
    SA_FEED_STEP_T3=PD4,
    SA_FEED_DIR_T3=PD3,
    SA_FEED_EN_T3=PD5,
    SA_FEED_UART_T3=PB5,

    # --- Tool 4 feed motor (M2) ---
    SA_FEED_STEP_T4=PC9,
    SA_FEED_DIR_T4=PC8,
    SA_FEED_EN_T4=PD2,
    SA_FEED_UART_T4=PB4,

    # --- Tool 5 feed motor (M3) ---
    SA_FEED_STEP_T5=PC15,
    SA_FEED_DIR_T5=PC11,
    SA_FEED_EN_T5=PC10,
    SA_FEED_UART_T5=PB3,

    # --- Tool 3 sensors (STOP1-4 + 2x7 header) ---
    SA_ENTRY_T3=PA15,
    SA_EXTRUDER_T3=PA10,
    SA_TOOLHEAD_T3=PD9,
    SA_TENSION_T3=PD8,
    SA_COMPRESSION_T3=PC7,

    # --- Tool 4 sensors ---
    SA_ENTRY_T4=PA9,
    SA_EXTRUDER_T4=PB12,
    SA_TOOLHEAD_T4=PB10,
    SA_TENSION_T4=PB1,
    SA_COMPRESSION_T4=PC5,

    # --- Tool 5 sensors ---
    SA_ENTRY_T5=PC6,
    SA_EXTRUDER_T5=PA8,
    SA_TOOLHEAD_T5=PB11,
    SA_TENSION_T5=PB2,
    SA_COMPRESSION_T5=PB0
