# Stealth Autoloader main file (include this only)
#
# Hardware includes are commented out until autoloader MCUs are physically connected.
# Steps to enable:
#   1. Run: ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0
#   2. Fill in the canbus_uuid values in hardware.cfg
#   3. Uncomment the two lines below
#
# [include pin_aliases.cfg]    # ← uncomment when MCU UUIDs are filled in
# [include hardware.cfg]       # ← uncomment when MCU UUIDs are filled in
[include macros.cfg]
