# Stealth Autoloader macros.cfg (your simple commands)

[gcode_macro FILAMENT_LOAD]
description: Load filament using your full flow chart
gcode:
    FILAMENT_LOAD

[gcode_macro FILAMENT_UNLOAD]
description: Unload filament back to roll
gcode:
    FILAMENT_UNLOAD

