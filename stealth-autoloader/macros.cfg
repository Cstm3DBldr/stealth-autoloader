# Stealth Autoloader macros.cfg
#
# User-facing gcode commands. These are thin wrappers that call the Python backend.
# The Python backend (filament_feed.py) registers SA_FILAMENT_LOAD / SA_FILAMENT_UNLOAD.
# All per-tool logic lives in Python — do not add logic here.

# ---------------------------------------------------------------------------
# Motor identification — run SA_BUZZ_M1 and SA_BUZZ_M3 to determine which
# motor driver your wiring harness is connected to.
# ---------------------------------------------------------------------------

[gcode_macro SA_BUZZ_M1]
description: Buzz M1 driver via feed_motor_t0 (PD4/PD3/PD5) — identify which motor moves
gcode:
    RESPOND MSG="Buzzing M1 (feed_motor_t0 — STEP=PD4, DIR=PD3, EN=PD5)..."
    MANUAL_STEPPER STEPPER=feed_motor_t0 ENABLE=1
    MANUAL_STEPPER STEPPER=feed_motor_t0 MOVE=5  SPEED=10
    MANUAL_STEPPER STEPPER=feed_motor_t0 MOVE=-5 SPEED=10
    MANUAL_STEPPER STEPPER=feed_motor_t0 MOVE=5  SPEED=10
    MANUAL_STEPPER STEPPER=feed_motor_t0 MOVE=-5 SPEED=10
    MANUAL_STEPPER STEPPER=feed_motor_t0 ENABLE=0
    RESPOND MSG="M1 buzz complete. Did a motor move? If yes, all tools are wired to M1."

[gcode_macro SA_BUZZ_M3]
description: Buzz M3 driver via feed_motor_t2 (PC15/PC11/PC10) — identify which motor moves
gcode:
    RESPOND MSG="Buzzing M3 (feed_motor_t2 — STEP=PC15, DIR=PC11, EN=PC10)..."
    MANUAL_STEPPER STEPPER=feed_motor_t2 ENABLE=1
    MANUAL_STEPPER STEPPER=feed_motor_t2 MOVE=5  SPEED=10
    MANUAL_STEPPER STEPPER=feed_motor_t2 MOVE=-5 SPEED=10
    MANUAL_STEPPER STEPPER=feed_motor_t2 MOVE=5  SPEED=10
    MANUAL_STEPPER STEPPER=feed_motor_t2 MOVE=-5 SPEED=10
    MANUAL_STEPPER STEPPER=feed_motor_t2 ENABLE=0
    RESPOND MSG="M3 buzz complete. Did a motor move? If yes, all tools are wired to M3."

# ---------------------------------------------------------------------------
# Encoder calibration
# Measures actual mm/pulse by feeding a known distance and comparing encoder.
# ---------------------------------------------------------------------------

[gcode_macro SA_CALIBRATE_ENCODER]
description: Calibrate encoder mm_per_pulse for a tool. TOOL=tool0..tool5
gcode:
    {% set tool = params.TOOL | default('tool0') %}
    {% set dist = params.DISTANCE | default(100) | float %}
    RESPOND MSG="SA_CALIBRATE_ENCODER: Insert filament into {tool} and press RESUME when ready."
    RESPOND MSG="Will feed {dist}mm via stepper, then report encoder count."
    RESPOND MSG="Run: SA_CALIBRATE_ENCODER_RUN TOOL={tool} DISTANCE={dist}"

[gcode_macro SA_CALIBRATE_ENCODER_RUN]
description: Execute encoder calibration feed. TOOL=tool0..tool5 DISTANCE=100
gcode:
    {% set tool   = params.TOOL     | default('tool0') %}
    {% set dist   = params.DISTANCE | default(100) | float %}
    {% set stepper = 'feed_motor_' + tool[-2:] %}
    RESPOND MSG="Feeding {dist}mm on {stepper}..."
    MANUAL_STEPPER STEPPER={stepper} ENABLE=1
    MANUAL_STEPPER STEPPER={stepper} MOVE={dist} SPEED=30
    M400
    {% set enc_dist = printer['sa_encoder ' + tool].distance %}
    RESPOND MSG="Stepper commanded: {dist}mm"
    RESPOND MSG="Encoder measured:  {enc_dist}mm"
    RESPOND MSG="Calculated mm_per_pulse = {(enc_dist / dist * 0.5) | round(4)}"
    RESPOND MSG="Update mm_per_pulse in [sa_encoder {tool}] in hardware.cfg"

# ---------------------------------------------------------------------------
# Tube length calibration
# Feed until encoder detects extruder entry, report encoder reading as tube_length.
# ---------------------------------------------------------------------------

[gcode_macro SA_CALIBRATE_TUBE]
description: Slowly feed filament and report encoder distance when it reaches extruder. TOOL=tool0..tool5
gcode:
    {% set tool = params.TOOL | default('tool0') %}
    RESPOND MSG="SA_CALIBRATE_TUBE: Starting slow feed on {tool}."
    RESPOND MSG="Watch the extruder — stop the feed (ESTOP or M112) the moment filament enters the extruder gears."
    RESPOND MSG="Then read: printer['sa_encoder {tool}'].distance — that is your tube_length."
    {% set stepper = 'feed_motor_' + tool[-2:] %}
    MANUAL_STEPPER STEPPER={stepper} ENABLE=1
    MANUAL_STEPPER STEPPER={stepper} MOVE=1200 SPEED=15
    M400
    {% set enc_dist = printer['sa_encoder ' + tool].distance %}
    RESPOND MSG="Feed complete. Encoder distance = {enc_dist}mm"
    RESPOND MSG="If filament reached extruder, set tube_length: {enc_dist | round(0) | int} in [filament_feed {tool}]"

# ---------------------------------------------------------------------------
# Active toolhead commands (uses currently selected tool)
# ---------------------------------------------------------------------------

[gcode_macro FILAMENT_LOAD]
description: Load filament on the currently active toolhead
gcode:
    {% set tool = printer.toolchanger.tool_number | default(0) %}
    SA_FILAMENT_LOAD TOOL=tool{tool}

[gcode_macro FILAMENT_UNLOAD]
description: Unload filament on the currently active toolhead
gcode:
    {% set tool = printer.toolchanger.tool_number | default(0) %}
    SA_FILAMENT_UNLOAD TOOL=tool{tool}

