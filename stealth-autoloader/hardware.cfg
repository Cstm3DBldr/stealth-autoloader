# Stealth Autoloader hardware.cfg
#
# MCU: BTT MMB CAN V2.0 (x2)
# Firmware: STM32G0B1 — 8 MHz crystal — CAN bus (on PD0/PD1)
# Flash: DFU mode, 8KiB bootloader offset
#
# To find canbus_uuid after flashing:
#   ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0

# ---------------------------------------------------------------------------
# MCU Definitions — BTT MMB CAN V2.0
# ---------------------------------------------------------------------------

[mcu autoloader_a]
# Tools 0, 1, 2
canbus_uuid: 329ce333239a

# [mcu autoloader_b]
# # Tools 3, 4, 5 — second board pending arrival
# canbus_uuid: 000000000000    # ← replace with UUID from canbus_query.py

# ---------------------------------------------------------------------------
# SA_BUZZ_M1 uses feed_motor_t0 (M1 = PD4/PD3/PD5)
# SA_BUZZ_M3 uses feed_motor_t2 (M3 = PC15/PC11/PC10)
# Run both buzz macros to identify which motor driver the harness is wired to.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Tool 0 — autoloader_a M1
# ---------------------------------------------------------------------------

[manual_stepper feed_motor_t0]
step_pin: autoloader_a:SA_FEED_STEP_T0
dir_pin: autoloader_a:SA_FEED_DIR_T0
enable_pin: !autoloader_a:SA_FEED_EN_T0
microsteps: 16
rotation_distance: 22.0
velocity: 50
accel: 400

[tmc2209 manual_stepper feed_motor_t0]
uart_pin: autoloader_a:SA_FEED_UART_T0
run_current: 0.800
stealthchop_threshold: 999999

[filament_switch_sensor entry_sensor_t0]
pause_on_runout: False
switch_pin: ^autoloader_a:SA_ENTRY_T0

[sa_encoder tool0]
sensor_pin: ^autoloader_a:SA_ENCODER_T0
mm_per_pulse: 0.5

[filament_feed tool0]
extruder: extruder
feed_stepper: manual_stepper feed_motor_t0
entry_sensor: filament_switch_sensor entry_sensor_t0
encoder: sa_encoder tool0
tube_length: 800
sensor_polling_frequency: 0.2
nozzle_distance: 50
purge_length: 30
load_temperature: 200
feed_step_size: 10
extruder_step_size: 5
engage_max_distance: 60
slip_tolerance: 15

