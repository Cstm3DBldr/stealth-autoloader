# Stealth Autoloader hardware.cfg - edit pins here (simple, like tapchanger)

[manual_stepper feed_motor]          # your new feed motor (one per tool later)
step_pin: ^your_pin_here             # ← CHANGE THIS
dir_pin: ^your_dir_pin
enable_pin: !your_enable_pin
microsteps: 16
rotation_distance: 22.0              # adjust for your gear
velocity: 50
accel: 400

[filament_switch_sensor entry_sensor]   # roll end of tube
pause_on_runout: False
switch_pin: ^your_entry_pin             # ← CHANGE THIS

[filament_feed tool0]                   # our component - copy for tool1-tool5 later
extruder: extruder                      # your toolhead extruder name
feed_stepper: manual_stepper feed_motor
entry_sensor: filament_switch_sensor entry_sensor
