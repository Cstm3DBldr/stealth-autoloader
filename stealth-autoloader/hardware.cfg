# Stealth Autoloader hardware.cfg
#
# MCU: BTT MMB CAN V2.0 (single board for all 6 paths)
# Firmware: STM32G0B1 — 8 MHz crystal — CAN bus (PD0/PD1)
# Motor drivers: BTT EZ5160 Pro (TMC5160) — [tmc5160] with software SPI
#   SPI bus: spi2 — MISO=PB14, MOSI=PB15, SCK=PB13
#   M3 (drive)    CS: PB3  (SA_DRIVE_CS)    STEP=PC15 DIR=PC11 EN=PC10
#   M1 (selector) CS: PB5  (SA_SELECTOR_CS) STEP=PD4  DIR=PD3  EN=PD5
#   sense_resistor: 0.075 (standard EZ5160 Pro)
#
# To find canbus_uuid after flashing:
#   ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0

# ── Persistent variable storage ──────────────────────────────────────────
# sa_motion.py saves selector position and current path after every move.
# stealth_autoloader.py saves per-path material/color/temp profiles here.
# On boot, all fields are restored automatically — no user re-entry needed.

[save_variables]
filename: ~/printer_data/config/stealth-autoloader/sa_variables.cfg

# ── MCU ──────────────────────────────────────────────────────────────────

[mcu autoloader]
canbus_uuid: 329ce333239a

# ── Drive motor — M3 (PC15/PC11/PC10, CS=PB3) ───────────────────────────
# Single feed gear that moves filament through the selected path.
# Servo must be engaged before running this motor.

[manual_stepper sa_drive]
step_pin: autoloader:SA_DRIVE_STEP
dir_pin: !autoloader:SA_DRIVE_DIR
enable_pin: !autoloader:SA_DRIVE_EN
microsteps: 16
rotation_distance: 22.0
velocity: 50
accel: 400

[tmc5160 manual_stepper sa_drive]
cs_pin: autoloader:SA_DRIVE_CS
spi_software_miso_pin: autoloader:PB14
spi_software_mosi_pin: autoloader:PB15
spi_software_sclk_pin: autoloader:PB13
run_current: 0.800
sense_resistor: 0.075
stealthchop_threshold: 999999
interpolate: True

# ── Selector motor — M1 (PD4/PD3/PD5, CS=PB5) ───────────────────────────
# Moves the drive gear carriage laterally to align with the active path.
# Home to endstop (SA_SELECTOR_STOP) before using, then position by mm.

[manual_stepper sa_selector]
step_pin: autoloader:SA_SELECTOR_STEP
dir_pin: !autoloader:SA_SELECTOR_DIR
enable_pin: !autoloader:SA_SELECTOR_EN
microsteps: 16
rotation_distance: 40.0
velocity: 200
accel: 800
endstop_pin: ^autoloader:SA_SELECTOR_STOP

[tmc5160 manual_stepper sa_selector]
cs_pin: autoloader:SA_SELECTOR_CS
spi_software_miso_pin: autoloader:PB14
spi_software_mosi_pin: autoloader:PB15
spi_software_sclk_pin: autoloader:PB13
run_current: 0.600
sense_resistor: 0.075
stealthchop_threshold: 0
interpolate: True
driver_SGT: 1              # stallguard threshold (unused for homing — retained for reference)

# ── Engage servo ──────────────────────────────────────────────────────────
# Clamps drive gear into the active path ("driven") or releases it ("neutral").
# initial_angle = disengaged so path is neutral at boot.

[servo sa_engage]
pin: autoloader:SA_SERVO
maximum_servo_angle: 180
minimum_pulse_width: 0.001
maximum_pulse_width: 0.002
initial_angle: 10

# ── Per-path encoders — one fixed encoder per filament path ──────────────
# Each encoder sits permanently inside its filament path, between the drive
# gear engagement point and the extruder. They never move.
# When the drive gear engages path N, only encoder N counts pulses.
# All 6 run simultaneously in the background via interrupt — no data loss.
# Calibrate each with: SA_CALIBRATE_ENCODER TOOL=N DISTANCE=100

[sa_encoder 0]
sensor_pin: ^autoloader:SA_ENCODER_0
mm_per_pulse: 1.0

[sa_encoder 1]
sensor_pin: ^autoloader:SA_ENCODER_1
mm_per_pulse: 1.0

[sa_encoder 2]
sensor_pin: ^autoloader:SA_ENCODER_2
mm_per_pulse: 1.0

[sa_encoder 3]
sensor_pin: ^autoloader:SA_ENCODER_3
mm_per_pulse: 1.0

[sa_encoder 4]
sensor_pin: ^autoloader:SA_ENCODER_4
mm_per_pulse: 1.0

[sa_encoder 5]
sensor_pin: ^autoloader:SA_ENCODER_5
mm_per_pulse: 1.0

# ── Entry sensors — one per filament path ────────────────────────────────
# Fixed position sensors at the roll end of each path.
# Note: ^! = pull-up + invert (sensors read HIGH when empty on this hardware).

[filament_switch_sensor entry_sensor_0]
pause_on_runout: False
switch_pin: ^!autoloader:SA_ENTRY_0

[filament_switch_sensor entry_sensor_1]
pause_on_runout: False
switch_pin: ^!autoloader:SA_ENTRY_1

[filament_switch_sensor entry_sensor_2]
pause_on_runout: False
switch_pin: ^!autoloader:SA_ENTRY_2

[filament_switch_sensor entry_sensor_3]
pause_on_runout: False
switch_pin: ^!autoloader:SA_ENTRY_3

[filament_switch_sensor entry_sensor_4]
pause_on_runout: False
switch_pin: ^!autoloader:SA_ENTRY_4

[filament_switch_sensor entry_sensor_5]
pause_on_runout: False
switch_pin: ^!autoloader:SA_ENTRY_5

# ── Toolhead filament sensors — one per toolhead (BTT EBB36, ^etN:PB5) ──────
# Detects filament presence at the nozzle end of each Bowden tube.

[filament_switch_sensor toolhead_sensor_0]
pause_on_runout: False
switch_pin: ^et0:PB5

[filament_switch_sensor toolhead_sensor_1]
pause_on_runout: False
switch_pin: ^et1:PB5

[filament_switch_sensor toolhead_sensor_2]
pause_on_runout: False
switch_pin: ^et2:PB5

[filament_switch_sensor toolhead_sensor_3]
pause_on_runout: False
switch_pin: ^et3:PB5

[filament_switch_sensor toolhead_sensor_4]
pause_on_runout: False
switch_pin: ^et4:PB5

[filament_switch_sensor toolhead_sensor_5]
pause_on_runout: False
switch_pin: ^et5:PB5

# ── Extruder entry sensors — one per toolhead (BTT EBB36, ^etN:PB8) ─────────
# Detects filament arriving at the extruder gears. Used by Bowden calibration
# and as the load target during automated loading (more accurate than tube_length).

[filament_switch_sensor extruder_sensor_0]
pause_on_runout: False
switch_pin: ^et0:PB8

[filament_switch_sensor extruder_sensor_1]
pause_on_runout: False
switch_pin: ^et1:PB8

[filament_switch_sensor extruder_sensor_2]
pause_on_runout: False
switch_pin: ^et2:PB8

[filament_switch_sensor extruder_sensor_3]
pause_on_runout: False
switch_pin: ^et3:PB8

[filament_switch_sensor extruder_sensor_4]
pause_on_runout: False
switch_pin: ^et4:PB8

[filament_switch_sensor extruder_sensor_5]
pause_on_runout: False
switch_pin: ^et5:PB8

# ── Main controller ───────────────────────────────────────────────────────
# Single [stealth_autoloader] section — all paths, all motion, all sequences.

[stealth_autoloader]
# Hardware references
drive_stepper    : manual_stepper sa_drive
selector_stepper : manual_stepper sa_selector
servo            : servo sa_engage

# Per-path encoder names (must match [sa_encoder N] section names above)
# Encoders are fixed in each path — they do not move with the selector.
encoder_0 : sa_encoder 0
encoder_1 : sa_encoder 1
encoder_2 : sa_encoder 2
encoder_3 : sa_encoder 3
encoder_4 : sa_encoder 4
encoder_5 : sa_encoder 5

# Servo positions (degrees)
# engaged_angle    = drive gear grips filament (tune until grip is firm)
# disengaged_angle = drive gear releases — path is neutral
servo_engaged_angle    : 160
servo_disengaged_angle : 10

# Number of filament paths (1-32)
num_paths : 6

# Entry sensor names — one per path (must match [filament_switch_sensor] section names above)
entry_sensor_0 : filament_switch_sensor entry_sensor_0
entry_sensor_1 : filament_switch_sensor entry_sensor_1
entry_sensor_2 : filament_switch_sensor entry_sensor_2
entry_sensor_3 : filament_switch_sensor entry_sensor_3
entry_sensor_4 : filament_switch_sensor entry_sensor_4
entry_sensor_5 : filament_switch_sensor entry_sensor_5

# Toolhead sensors — filament at nozzle end of each Bowden tube (BTT EBB36, PB5)
toolhead_sensor_0 : filament_switch_sensor toolhead_sensor_0
toolhead_sensor_1 : filament_switch_sensor toolhead_sensor_1
toolhead_sensor_2 : filament_switch_sensor toolhead_sensor_2
toolhead_sensor_3 : filament_switch_sensor toolhead_sensor_3
toolhead_sensor_4 : filament_switch_sensor toolhead_sensor_4
toolhead_sensor_5 : filament_switch_sensor toolhead_sensor_5

# Extruder entry sensors — filament at extruder gears (BTT EBB36, PB8)
# Used as load target (more accurate than tube_length) and for Bowden calibration.
extruder_sensor_0 : filament_switch_sensor extruder_sensor_0
extruder_sensor_1 : filament_switch_sensor extruder_sensor_1
extruder_sensor_2 : filament_switch_sensor extruder_sensor_2
extruder_sensor_3 : filament_switch_sensor extruder_sensor_3
extruder_sensor_4 : filament_switch_sensor extruder_sensor_4
extruder_sensor_5 : filament_switch_sensor extruder_sensor_5

# Selector positions in mm from home — calibrate with SA_CALIBRATE_SELECTOR TOOL=N
# Default spacing is 21mm per path (typical ERCF gear spacing)
selector_position_0 : 0.0
selector_position_1 : 21.0
selector_position_2 : 42.0
selector_position_3 : 63.0
selector_position_4 : 84.0
selector_position_5 : 105.0

# Extruder names for heating (match printer.cfg toolchanger extruder names)
extruder_0 : extruder
extruder_1 : extruder1
extruder_2 : extruder2
extruder_3 : extruder3
extruder_4 : extruder4
extruder_5 : extruder5

# Tube + path distances (mm)
tube_length         : 800    # drive gear output → extruder gears (encoder target)
nozzle_distance     : 50     # extruder gears → nozzle tip
purge_length        : 30     # extra extrusion after nozzle is reached
engage_max_distance : 60     # max drive travel before expecting encoder motion (jam detect)

# Temperatures
load_temperature : 200       # minimum hotend temp before any extrusion

# Motion speeds
feed_speed      : 50         # drive motor feed speed (mm/s)
selector_speed  : 200        # selector motor speed (mm/s)
feed_step_size  : 10         # drive motor step per loop iteration (mm)

# Safety / monitoring
slip_tolerance       : 15    # warn if encoder vs stepper differ by more than this %
sensor_polling_delay : 0.2   # seconds between sensor checks in feed loops
servo_move_delay     : 0.3   # seconds to wait after servo position command

# Stepper auto-disable timeout (seconds after last move; 0 = never)
stepper_timeout      : 120

# Selector homing parameters (SA_HOME — physical endstop switch, PA15)
# Double-touch: fast approach → SET_POSITION=0 → back off → slow re-approach → SET_POSITION=0
selector_max_travel     : 200.0   # max travel during fast homing approach (mm)
selector_homing_speed   : 50.0    # mm/s for fast homing approach
selector_homing_backoff : 5.0     # mm to back off before slow re-approach

# Selector geometry — used by SA_CALIBRATE_SELECTOR position calculation
# selector_end_offset: mm to subtract from measured total travel before dividing into paths.
#   Accounts for carriage overtravel past the last path center at the far end.
#   Example: if total_travel=128.5mm and last path is 6mm inside the far wall, set 6.0.
#   Positions = (total_travel - selector_end_offset) / (num_paths - 1) * N
# path_width: nominal center-to-center spacing (mm). Optional — shown alongside calculated
#   spacing after calibration as a sanity check. Set 0 to disable.
selector_end_offset  : 6.0    # mm overtravel past last path center at far wall
path_width           : 25.0   # mm — nominal path-to-path spacing (validation only)
selector_cal_current : 0.4    # A — reduced current during SA_CALIBRATE_SELECTOR far-wall sweep (quieter grind)

# Bowden tube lengths per path (mm from drive gear encoder to extruder entry sensor)
# Calibrate with: SA_CALIBRATE_BOWDEN TOOL=N
# Used when extruder_sensor_N triggers for the load target; falls back to tube_length if not configured.
bowden_length_0 : 800.0
bowden_length_1 : 800.0
bowden_length_2 : 800.0
bowden_length_3 : 800.0
bowden_length_4 : 800.0
bowden_length_5 : 800.0
