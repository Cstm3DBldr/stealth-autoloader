# Stealth Autoloader hardware.cfg - edit pins here (one path now, copy for tool1-tool5 later)
# All values configurable - no massive rework

[manual_stepper feed_motor]          # NEW feed motor per filament path
step_pin: ^your_step_pin             # ← CHANGE
dir_pin: ^your_dir_pin
enable_pin: !your_enable_pin
microsteps: 16
rotation_distance: 22.0              # adjust for your gear
velocity: 50
accel: 400

[filament_switch_sensor entry_sensor]   # at roll end of tube - triggers load
pause_on_runout: False
switch_pin: ^your_entry_pin             # ← CHANGE

[filament_switch_sensor extruder_sensor] # toolhead filament sensor BEFORE extruder
pause_on_runout: False
switch_pin: ^your_toolhead_extruder_sensor_pin  # ← CHANGE

[filament_switch_sensor toolhead_sensor] # toolhead filament sensor AFTER extruder
pause_on_runout: False
switch_pin: ^your_toolhead_sensor_pin   # ← CHANGE

[filament_switch_sensor buffer_tension] # tension switch (default spring-loaded state)
pause_on_runout: False
switch_pin: ^your_tension_pin           # ← CHANGE

[filament_switch_sensor buffer_compression] # compression switch
pause_on_runout: False
switch_pin: ^your_compression_pin       # ← CHANGE

[filament_feed tool0]                   # our component - copy section for tool1-tool5
extruder: extruder                      # your active toolhead extruder name
feed_stepper: manual_stepper feed_motor
entry_sensor: filament_switch_sensor entry_sensor
extruder_sensor: filament_switch_sensor extruder_sensor
toolhead_sensor: filament_switch_sensor toolhead_sensor
buffer_tension_sensor: filament_switch_sensor buffer_tension
buffer_compression_sensor: filament_switch_sensor buffer_compression
