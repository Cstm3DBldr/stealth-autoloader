# Stealth Autoloader hardware.cfg - edit pins and values here
# Copy the entire [filament_feed toolN] block for each toolhead

# ==================== TOOL 0 ====================
[manual_stepper feed_motor_t0]
step_pin: ^your_step_pin_t0
dir_pin: ^your_dir_pin_t0
enable_pin: !your_enable_pin_t0
microsteps: 16
rotation_distance: 22.0
velocity: 50
accel: 400

[filament_switch_sensor entry_sensor_t0]
pause_on_runout: False
switch_pin: ^your_entry_pin_t0

[filament_switch_sensor extruder_sensor_t0]
pause_on_runout: False
switch_pin: ^your_extruder_sensor_pin_t0

[filament_switch_sensor toolhead_sensor_t0]
pause_on_runout: False
switch_pin: ^your_toolhead_sensor_pin_t0

[filament_switch_sensor buffer_tension_t0]
pause_on_runout: False
switch_pin: ^your_tension_pin_t0

[filament_switch_sensor buffer_compression_t0]
pause_on_runout: False
switch_pin: ^your_compression_pin_t0

[filament_feed tool0]
extruder: extruder0                    # your toolhead extruder name
feed_stepper: manual_stepper feed_motor_t0
entry_sensor: filament_switch_sensor entry_sensor_t0
extruder_sensor: filament_switch_sensor extruder_sensor_t0
toolhead_sensor: filament_switch_sensor toolhead_sensor_t0
buffer_tension_sensor: filament_switch_sensor buffer_tension_t0
buffer_compression_sensor: filament_switch_sensor buffer_compression_t0

# Configurable values for tool0 (copy for other tools)
[tube_length_t0]
tube_length: 800                       # mm from feed motor to toolhead sensor

[sensor_polling_frequency_t0]
delay: 0.2                             # seconds between sensor checks

[buffer_slide_distance_t0]
buffer_slide: 15                       # mm between tension and compression

[extruder_gear_distance_t0]
extruder_gear: 30                      # mm from extruder gears to toolhead entry sensor

[nozzle_distance_t0]
nozzle: 50                             # mm from toolhead sensor to nozzle

[purge_length_t0]
purge: 30                              # mm to purge after loading

