# Stealth Autoloader hardware.cfg
#
# MCU: BTT MMB CAN V2.0 (x2)
# Firmware: STM32G0B1 — 8 MHz crystal — CAN bus (on PD0/PD1)
# Flash: DFU mode, 8KiB bootloader offset
#
# To find canbus_uuid after flashing:
#   ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0
#
# Uncomment MCU sections and the includes in stealth-autoloader.cfg
# once both boards are flashed and UUIDs are known.

# ---------------------------------------------------------------------------
# MCU Definitions — BTT MMB CAN V2.0
# ---------------------------------------------------------------------------

# [mcu autoloader_a]
# # Tools 0, 1, 2
# canbus_uuid: 000000000000    # ← replace with UUID from canbus_query.py

# [mcu autoloader_b]
# # Tools 3, 4, 5
# canbus_uuid: 000000000000    # ← replace with UUID from canbus_query.py

# ---------------------------------------------------------------------------
# Tool 0
# ---------------------------------------------------------------------------

[manual_stepper feed_motor_t0]
step_pin: ^SA_FEED_STEP_T0
dir_pin: SA_FEED_DIR_T0
enable_pin: !SA_FEED_EN_T0
microsteps: 16
rotation_distance: 22.0
velocity: 50
accel: 400

[tmc2209 manual_stepper feed_motor_t0]
uart_pin: SA_FEED_UART_T0
run_current: 0.800
stealthchop_threshold: 999999

[filament_switch_sensor entry_sensor_t0]
pause_on_runout: False
switch_pin: ^SA_ENTRY_T0

[filament_switch_sensor extruder_sensor_t0]
pause_on_runout: False
switch_pin: ^SA_EXTRUDER_T0

[filament_switch_sensor toolhead_sensor_t0]
pause_on_runout: False
switch_pin: ^SA_TOOLHEAD_T0

[filament_switch_sensor buffer_tension_t0]
pause_on_runout: False
switch_pin: ^SA_TENSION_T0

[filament_switch_sensor buffer_compression_t0]
pause_on_runout: False
switch_pin: ^SA_COMPRESSION_T0

[filament_feed tool0]
extruder: extruder
feed_stepper: manual_stepper feed_motor_t0
entry_sensor: filament_switch_sensor entry_sensor_t0
extruder_sensor: filament_switch_sensor extruder_sensor_t0
toolhead_sensor: filament_switch_sensor toolhead_sensor_t0
buffer_tension_sensor: filament_switch_sensor buffer_tension_t0
buffer_compression_sensor: filament_switch_sensor buffer_compression_t0
tube_length: 800
sensor_polling_frequency: 0.2
buffer_slide_distance: 15
extruder_gear_distance: 30
nozzle_distance: 50
purge_length: 30
load_temperature: 200
feed_step_size: 10
extruder_step_size: 5

