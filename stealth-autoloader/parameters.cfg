# Stealth Autoloader — Parameter Reference
#
# This file is a REFERENCE ONLY. It is intentionally empty of Klipper sections.
# All tunable values live inside the [filament_feed toolX] sections in hardware.cfg.
# Edit them there — not here.
#
# ---------------------------------------------------------------------------
# Variable reference for each [filament_feed toolX] section
# ---------------------------------------------------------------------------
#
# tube_length               mm    Feed motor to extruder sensor (full tube run)
# sensor_polling_frequency  sec   Delay between sensor checks in all feed loops
# buffer_slide_distance     mm    Distance between tension state and compression state
# extruder_gear_distance    mm    Extruder gears to toolhead sensor
# nozzle_distance           mm    Toolhead sensor to nozzle tip
# purge_length              mm    Extra extrusion after nozzle is loaded
# load_temperature          C     Minimum hotend temp before any extrusion is attempted
# feed_step_size            mm    Feed motor movement per loop iteration
# extruder_step_size        mm    Extruder movement per loop iteration
