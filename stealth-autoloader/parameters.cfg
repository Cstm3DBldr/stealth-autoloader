# Stealth Autoloader parameters.cfg - all tunable values here (Happy Hare style)

# ==================== TOOL 0 ====================
[tube_length_t0]
tube_length: 800                       # mm from feed motor to toolhead sensor

[sensor_polling_frequency_t0]
delay: 0.2                             # seconds between sensor checks

[buffer_slide_distance_t0]
buffer_slide: 15                       # mm between tension and compression state

[extruder_gear_distance_t0]
extruder_gear: 30                      # mm from extruder gears to toolhead entry sensor

[nozzle_distance_t0]
nozzle: 50                             # mm from toolhead sensor to nozzle

[purge_length_t0]
purge: 30                              # mm to purge after loading

# Copy the entire block above for tool1-tool5 when ready
